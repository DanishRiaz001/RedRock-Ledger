function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[mode,setMode]=useState("login");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[done,setDone]=useState(false);
  const inp2={background:"#FAF9F7",border:`1px solid ${T.border}`,borderRadius:12,color:T.text,padding:"13px 16px",width:"100%",fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
  const handle=async()=>{
    setErr("");setLoading(true);
    if(mode==="login"){
      const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)setErr(error.message); else onLogin(data.user);
    } else if(mode==="signup"){
      const{error}=await sb.auth.signUp({email,password:pass});
      if(error)setErr(error.message); else setDone(true);
    } else {
      const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
      if(error)setErr(error.message); else setDone(true);
    }
    setLoading(false);
  };
  const onKey=e=>{if(e.key==="Enter")handle();};

  if(done)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FAF9F7",padding:24}}>
      <div style={{textAlign:"center",maxWidth:340}}>
        <img src={LOGO_B64} style={{width:120,marginBottom:20}}/>
        <div style={{fontSize:18,fontWeight:800,marginBottom:8,color:"#0F172A"}}>{mode==="signup"?"Check your email":"Reset link sent"}</div>
        <div style={{fontSize:13,color:"#64748B",marginBottom:24,lineHeight:1.6}}>{mode==="signup"?"We sent a confirmation link. Click it then come back to sign in.":"Check your email for a reset link."}</div>
        <button style={{background:"#0D7377",color:"#fff",border:"none",borderRadius:12,padding:"13px",fontWeight:700,fontSize:14,cursor:"pointer",width:"100%",fontFamily:"inherit"}} onClick={()=>{setDone(false);setMode("login");}}>Back to Sign In</button>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#FAF9F7",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:360}}>

        <div style={{textAlign:"center",marginBottom:32}}>
          <img src={LOGO_B64} style={{width:180,marginBottom:8}}/>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.6)",fontWeight:600,letterSpacing:1,textTransform:"uppercase"}}>

        </div>

          {err&&<div style={{background:"#FFF0F2",border:"1px solid #FFCDD3",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#0D7377",marginBottom:16,fontWeight:600}}>{err}</div>}

          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748B",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Email</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={onKey} placeholder="you@example.com" style={inp2}/>
          </div>

          {mode!=="forgot"&&(
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:"#64748B",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Password</div>

            )}

        </div>

        <div style={{textAlign:"center",marginTop:24,fontSize:11,color:"#CBD5E1"}}>Redrock Danria Accountants · Secure Login</div>

function AppShell({user}){
  const[profile,setProfile]=useState(null);
  const[profiles,setProfiles]=useState([]);
  const[viewingUserId,setViewingUserId]=useState(user.id);
  const[accounts,setAccountsState]=useState([]);
  const[contacts,setContactsState]=useState([]);
  const[transactions,setTransactionsState]=useState([]);
  const[sinkingFunds,setSFState]=useState([]);
  const[nextBilag,setNextBilag]=useState(1);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.from("profiles").select("*").eq("id",user.id).single().then(({data})=>{
      if(data){setProfile(data);if(data.is_admin){sb.from("profiles").select("*").then(({data:all})=>{if(all)setProfiles(all);});}}
    });
  },[user.id]);

  useEffect(()=>{
    setLoading(true);
    Promise.all([
      sb.from("accounts").select("*").eq("user_id",viewingUserId).order("code"),
      sb.from("contacts").select("*").eq("user_id",viewingUserId).order("contact_id"),
      sb.from("transactions").select("*").eq("user_id",viewingUserId).order("bilag"),
      sb.from("sinking_funds").select("*").eq("user_id",viewingUserId).order("fund_id"),
    ]).then(([aR,cR,tR,sR])=>{
      const accs=aR.data||[];
      setAccountsState(accs.length?accs.map(a=>({code:a.code,name:a.name})):DEFAULT_ACCOUNTS);
      setContactsState((cR.data||[]).map(c=>({id:c.contact_id,type:c.type,name:c.name,notes:c.notes||""})));
      const txns=(tR.data||[]).map(t=>({id:t.id,bilag:t.bilag,date:t.date,debitCode:t.debit_code,creditCode:t.credit_code,description:t.description,amount:parseFloat(t.amount),contactId:t.contact_id,matchedWith:t.matched_with,reversedBy:t.reversed_by,reversalOf:t.reversal_of}));
      setTransactionsState(txns);
      setNextBilag(txns.reduce((m,t)=>Math.max(m,t.bilag),0)+1);
      setSFState((sR.data||[]).map(f=>({id:f.fund_id,name:f.name,goal:parseFloat(f.goal),saved:parseFloat(f.saved),color:f.color,icon:f.icon})));
      setLoading(false);
    });
  },[viewingUserId]);

  const canEdit=viewingUserId===user.id;

  const setAccounts=async(list)=>{
    setAccountsState(list);
    if(!canEdit)return;
    // Upsert each account individually — safer than delete+insert
    for(const a of list){
      await sb.from("accounts").upsert({user_id:user.id,code:a.code,name:a.name},{onConflict:"user_id,code"});
    }
  };

  const setContacts=async(list)=>{
    setContactsState(list);
    if(!canEdit)return;
    await sb.from("contacts").delete().eq("user_id",user.id);
    if(list.length)await sb.from("contacts").insert(list.map(c=>({user_id:user.id,contact_id:c.id,type:c.type,name:c.name,notes:c.notes||""})));
  };

  const addTransaction=async(form)=>{
    if(!canEdit)return;
    const nb=nextBilag;
    const{data}=await sb.from("transactions").insert([{user_id:user.id,bilag:nb,date:form.date,debit_code:form.debitCode,credit_code:form.creditCode,description:form.description,amount:form.amount,contact_id:form.contactId||null}]).select().single();
    if(data){
      setTransactionsState(p=>[...p,{id:data.id,bilag:nb,date:form.date,debitCode:form.debitCode,creditCode:form.creditCode,description:form.description,amount:form.amount,contactId:form.contactId||null}]);
      setNextBilag(nb+1);
    }
  };

  const saveEdit=async(u)=>{
    setTransactionsState(p=>p.map(t=>t.id===u.id?u:t));
    if(!canEdit)return;
    await sb.from("transactions").update({date:u.date,debit_code:u.debitCode,credit_code:u.creditCode,description:u.description,amount:u.amount,contact_id:u.contactId||null}).eq("id",u.id);
  };

  const deleteTxn=async(id)=>{
    setTransactionsState(p=>p.filter(t=>t.id!==id));
    if(!canEdit)return;
    await sb.from("transactions").delete().eq("id",id);
  };

  const reverseTransaction=async(t)=>{
    if(!canEdit)return;
    const rb=nextBilag;
    const grp="rev-"+Date.now();
    const today=new Date().toISOString().split("T")[0];
    const desc="Reversal of "+fmtB(t.bilag)+" — "+t.description;
    const{data}=await sb.from("transactions").insert([{user_id:user.id,bilag:rb,date:today,debit_code:t.creditCode,credit_code:t.debitCode,description:desc,amount:t.amount,matched_with:grp,reversal_of:t.bilag}]).select().single();
    await sb.from("transactions").update({reversed_by:rb,matched_with:grp}).eq("id",t.id);
    if(data){
      setTransactionsState(p=>[...p.map(x=>x.id===t.id?{...x,reversedBy:rb,matchedWith:grp}:x),{id:data.id,bilag:rb,date:today,debitCode:t.creditCode,creditCode:t.debitCode,description:desc,amount:t.amount,matchedWith:grp,reversalOf:t.bilag}]);
      setNextBilag(rb+1);
    }
  };

  const matchTransactions=async(ids,grpId)=>{
    setTransactionsState(p=>p.map(t=>ids.includes(t.id)?{...t,matchedWith:grpId}:t));
    if(!canEdit)return;
    await Promise.all(ids.map(id=>sb.from("transactions").update({matched_with:grpId}).eq("id",id)));
  };

  const saveSinkingFunds=async(list)=>{
    setSFState(list);
    if(!canEdit)return;
    await sb.from("sinking_funds").delete().eq("user_id",user.id);
    if(list.length)await sb.from("sinking_funds").insert(list.map(f=>({user_id:user.id,fund_id:f.id,name:f.name,goal:f.goal,saved:f.saved,color:f.color,icon:f.icon})));
  };

  const signOut=async()=>{await sb.auth.signOut();window.location.reload();};
  const isAdmin=profile&&profile.is_admin;

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FAF9F7",flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>📒</div>
      <div style={{fontSize:14,color:"#6B7280",fontWeight:600}}>Loading your ledger…</div>
    </div>
  );

  return(
    <div>
      {isAdmin&&profiles.length>0&&<AdminBanner profiles={profiles} viewingUserId={viewingUserId} onSwitch={setViewingUserId}/>}
      <FinanceTracker
        isAdmin={isAdmin} canEdit={canEdit} profiles={profiles}
        viewingUserId={viewingUserId} onSwitchUser={setViewingUserId}
        accounts={accounts} setAccounts={setAccounts}
        contacts={contacts} setContacts={setContacts}
        transactions={transactions} addTransaction={addTransaction}
        saveEdit={saveEdit} deleteTxn={deleteTxn}
        reverseTransaction={reverseTransaction} matchTransactions={matchTransactions}
        sinkingFunds={sinkingFunds} saveSinkingFunds={saveSinkingFunds}
        nextBilag={nextBilag} onSignOut={signOut}
      />
    </div>
  );
}

function Root(){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?session.user:null);setChecking(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?session.user:null));
    return()=>subscription.unsubscribe();
  },[]);
  if(checking)return <Spinner/>;
  if(!user)return <LoginScreen onLogin={setUser}/>;
  return <AppShell user={user}/>;
}

  if(n>=1900&&n<2000)return"1900";
  if(n>=1500&&n<1600)return"1500";
  if(n>=1000&&n<2000)return"1000";
  if(n>=2400&&n<2500)return"2400";
  if(n>=2000&&n<3000)return"2000";
  if(n>=3000&&n<4000)return"3000";
  if(n>=4000&&n<5000)return"4000";
  return null;
};

const fmtB=(n)=>`B${String(n).padStart(3,"0")}`;
const sign=(n)=>(n>=0?"+":"−")+fmt(n);
const signRs=(n)=>(n>=0?"+":"−")+fmtRs(n);

function ContactSearch({contacts,value,onChange}){

  const filtered=useMemo(()=>{
    if(!q.trim())return[];
    const ql=q.toLowerCase();
    return contacts.filter(c=>c.name.toLowerCase().includes(ql)||c.id.toLowerCase().includes(ql)).slice(0,8);
  },[contacts,q]);

  const select=(c)=>{
    onChange(c.id);
    setQ("");
    setOpen(false);

  return(
    <div style={{position:"relative"}}>

// ─── MatchedGroups — renders grouped matched entries (no IIFE) ────────────────

function MatchedGroups({matchedRows,getMovement}){
  const groups={};
  matchedRows.forEach(r=>{
    const g=r.matchedWith;
    if(!groups[g])groups[g]=[];
    groups[g].push(r);
  });
  return(
    <div>
      {Object.entries(groups).map(([grpId,grpRows])=>{
        const isRev=grpRows.some(r=>!!r.reversalOf);
        const lc=isRev?T.red:T.green;
        const lb=isRev?T.redLight:T.greenBg;
        const bc=isRev?"#FFCDD3":"#b7e4d4";
        return(
          <div key={grpId} style={{background:lb,borderRadius:12,padding:"10px 12px",marginBottom:8,border:`1px solid ${bc}`}}>
            <div style={{fontSize:10,color:lc,fontWeight:800,marginBottom:6,letterSpacing:0.5}}>{isRev?"↩ Reversal":"✓ Matched"}</div>
            {grpRows.map(r=>{
              const mv=getMovement?getMovement(r):r.movement||0;
              return(
                <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:`1px solid ${bc}`,fontSize:12,alignItems:"center"}}>
                  <div>
                    <span style={{color:T.sub,fontWeight:700}}>{fmtB(r.bilag)}</span>
                    <span style={{color:T.muted,marginLeft:6}}>{r.description}</span>
                  </div>
                  <span style={{fontWeight:700,color:mv>=0?T.green:T.red,minWidth:70,textAlign:"right"}}>{sign(mv)}</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ─── Admin feature helpers ────────────────────────────────────────────────────
const ADMIN_KEY="rr_admin_features";
const USER_FEATS_KEY="rr_user_features"; // {userId: {featureId: bool}}

const getAdminFeatures=()=>{try{return JSON.parse(localStorage.getItem(ADMIN_KEY)||"{}")}catch{return{};}};
const getUserFeatures=(userId)=>{try{const all=JSON.parse(localStorage.getItem(USER_FEATS_KEY)||"{}");return all[userId]||{};}catch{return{};}};
const setUserFeature=(userId,featureId,val)=>{
  try{
    const all=JSON.parse(localStorage.getItem(USER_FEATS_KEY)||"{}");
    if(!all[userId])all[userId]={};
    all[userId][featureId]=val;
    localStorage.setItem(USER_FEATS_KEY,JSON.stringify(all));
  }catch{}
};
// Feature is on if admin has enabled it globally AND user has it enabled (or user setting not set, defaults to admin setting)
const isFeatureOn=(featureId,userId)=>{
  const admin=getAdminFeatures();
  if(admin[featureId]===false)return false; // admin disabled globally
  const user=getUserFeatures(userId);
  return user[featureId]!==false; // default on unless user explicitly off
};

// Period close helper
const PERIOD_CLOSE_KEY="rr_period_close";
const getPeriodClose=()=>localStorage.getItem(PERIOD_CLOSE_KEY)||null;
const isDateClosed=(date)=>{const pc=getPeriodClose();return pc&&date<=pc;};

function LedgerScreen({account,accounts,contacts,transactions,onBack,onEditTxn,onDeleteTxn,onReverseTxn,onMatchTxns,filterFrom,filterTo}){
  const today=new Date().toISOString().split("T")[0];
  const[from,setFrom]=useState(filterFrom||"2026-01-01");
  const[to,setTo]=useState(filterTo||today);
  const[detailTxn,setDetailTxn]=useState(null);
  const[selected,setSelected]=useState([]);
  const[showMatched,setShowMatched]=useState(false);
  const[showSearch,setShowSearch]=useState(false);
  const[ledgerSearch,setLedgerSearch]=useState("");
  const sk=getSK(account.code);
  const series=sk?SERIES[sk]:null;
  const getName=code=>((accounts.find(a=>a.code===code))||{name:code}).name;

  const openingBal=useMemo(()=>
    transactions.filter(t=>t.date<from&&(t.debitCode===account.code||t.creditCode===account.code))
      .reduce((s,t)=>t.debitCode===account.code?s+t.amount:s-t.amount,0),
  [transactions,account.code,from]);

  const allRows=useMemo(()=>{
    let running=openingBal;
    return transactions
      .filter(t=>t.date>=from&&t.date<=to&&(t.debitCode===account.code||t.creditCode===account.code))
      .sort((a,b)=>a.date.localeCompare(b.date))
      .map(t=>{const isDr=t.debitCode===account.code;const movement=isDr?t.amount:-t.amount;running+=movement;return{...t,movement,balance:running};});
  },[transactions,account.code,from,to,openingBal]);

  const rows=useMemo(()=>{
    const base=allRows.filter(r=>!r.matchedWith);
    if(!ledgerSearch)return base;
    const q=ledgerSearch.toLowerCase();
    return base.filter(r=>r.description?.toLowerCase().includes(q)||fmtB(r.bilag).toLowerCase().includes(q)||String(r.amount).includes(q));
  },[allRows,ledgerSearch]);
  const matchedRows=allRows.filter(r=>!!r.matchedWith);
  const closingBal=allRows.length>0?allRows[allRows.length-1].balance:openingBal;
  const periodMovement=allRows.reduce((s,r)=>s+r.movement,0);

  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const selSum=selected.reduce((s,id)=>{const r=rows.find(x=>x.id===id);return r?s+r.movement:s;},0);
  const doMatch=()=>{if(selected.length<2||Math.abs(selSum)>=1)return;onMatchTxns(selected,Date.now().toString());setSelected([]);};

  const exportLedger=()=>{
    const csvRows=[["Date","Bilag","Description","Movement","Balance"]];
    allRows.forEach(r=>{csvRows.push([r.date,fmtB(r.bilag),r.description,r.movement,r.balance]);});
    const csv=csvRows.map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`Ledger_${account.code}_${from}_${to}.csv`;a.click();
  };

  const exportLedgerPDF=()=>{
    const w=window.open("","_blank");
    let rows=allRows.map(r=>`<tr><td>${r.date}</td><td>${fmtB(r.bilag)}</td><td>${r.description}</td><td style="text-align:right;color:${r.movement>=0?"#059669":"#DC2626"}">${r.movement>=0?"+":"−"}${fmt(Math.abs(r.movement))}</td><td style="text-align:right">${sign(r.balance)}</td></tr>`).join("");
    w.document.write(`<!DOCTYPE html><html><head><title>Ledger ${account.code}</title><style>body{font-family:Arial,sans-serif;font-size:12px;margin:30px}h1{font-size:16px}table{width:100%;border-collapse:collapse}th{background:#0D7377;color:#fff;padding:7px 10px;text-align:left;font-size:11px}td{padding:6px 10px;border-bottom:1px solid #eee;font-size:11px}tr:nth-child(even) td{background:#f9f9f9}.foot{display:flex;gap:30px;margin-top:16px;padding:10px;background:#f0f0f0;border-radius:6px}.foot div{text-align:center}.foot .lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px}.foot .val{font-size:13px;font-weight:bold}@media print{button{display:none}}</style></head><body>
    <h1>${account.code} · ${account.name}</h1><p style="color:#888;font-size:11px">Period: ${from} → ${to}</p>
    <table><thead><tr><th>Date</th><th>Bilag</th><th>Description</th><th style="text-align:right">Movement</th><th style="text-align:right">Balance</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="foot"><div><div class="lbl">Opening</div><div class="val">${sign(openingBal)}</div></div><div><div class="lbl">Period</div><div class="val">${sign(periodMovement)}</div></div><div><div class="lbl">Closing</div><div class="val">${sign(closingBal)}</div></div></div>
    <button onclick="window.print()" style="margin-top:20px;padding:8px 18px;background:#0D7377;color:#fff;border:none;border-radius:6px;cursor:pointer">🖨 Print / Save PDF</button>
    </body></html>`);
    w.document.close();setTimeout(()=>w.print(),400);
  };

  const[exportMenu,setExportMenu]=useState(false);

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:90}}>
      {detailTxn&&<DetailModal txn={detailTxn} accounts={accounts} contacts={contacts}
        onEdit={u=>{onEditTxn(u);setDetailTxn(null);}}
        onDelete={id=>{onDeleteTxn(id);setDetailTxn(null);}}
        onReverse={tx=>{onReverseTxn(tx);setDetailTxn(null);}}
        onClose={()=>setDetailTxn(null)}/>}
      <BackHeader title={account.name} sub={`${(series&&series.icon)||""} ${(series&&series.name)||""} · ${account.code}`} color={series&&series.color} onBack={onBack}
        right={
          <div style={{position:"relative"}}>
            <button onClick={()=>setExportMenu(o=>!o)} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:10,color:"#fff",fontSize:14,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,letterSpacing:1}}>•••</button>
            {exportMenu&&(
              <>
                <div onClick={()=>setExportMenu(false)} style={{position:"fixed",inset:0,zIndex:290}}/>
                <div style={{position:"absolute",right:0,top:44,background:"#fff",border:`1px solid ${T.border}`,borderRadius:12,zIndex:300,minWidth:160,boxShadow:"0 8px 24px rgba(0,0,0,0.15)"}}>
                  <div onClick={()=>{exportLedger();setExportMenu(false);}} style={{padding:"13px 16px",fontSize:13,cursor:"pointer",color:T.accent,fontWeight:600,display:"flex",alignItems:"center",gap:8,borderBottom:`1px solid ${T.border}`}}>📄 Export CSV</div>
                  <div onClick={()=>{exportLedgerPDF();setExportMenu(false);}} style={{padding:"13px 16px",fontSize:13,cursor:"pointer",color:T.red,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>📕 Export PDF</div>
                </div>
              </>
            )}
          </div>
        }
      />
      <div style={{background:"#fff",borderBottom:`1px solid ${T.border}`,padding:"8px 12px"}}>
        {/* Quick period buttons */}
        <div style={{display:"flex",gap:4,marginBottom:showSearch?8:0,overflowX:"auto",scrollbarWidth:"none",alignItems:"center"}}>
          <select value={from.slice(0,4)} onChange={e=>{const y=e.target.value;setFrom(`${y}-01-01`);setTo(`${y}-12-31`);}} style={{fontSize:11,fontWeight:700,color:T.text,background:"#f3f4f6",border:"none",borderRadius:7,padding:"4px 8px",cursor:"pointer",fontFamily:"inherit",outline:"none",flexShrink:0}}>
            {[2023,2024,2025,2026,2027,2028].map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <div style={{display:"flex",gap:3,flex:1,overflowX:"auto",scrollbarWidth:"none"}}>
            {["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].map((m,i)=>{
              const mm=String(i+1).padStart(2,"0");
              const y=from.slice(0,4);
              const active=from===`${y}-${mm}-01`&&to===`${y}-${mm}-${new Date(parseInt(y),i+1,0).getDate()}`;
              return(
                <button key={i} onClick={()=>{const y2=from.slice(0,4);const last=new Date(parseInt(y2),i+1,0).getDate();setFrom(`${y2}-${mm}-01`);setTo(`${y2}-${mm}-${String(last).padStart(2,"0")}`);}} style={{flexShrink:0,padding:"3px 7px",borderRadius:7,border:`1.5px solid ${active?T.accent:T.border}`,background:active?T.accent:"#fff",color:active?"#fff":T.sub,fontSize:10,fontWeight:active?700:400,cursor:"pointer",fontFamily:"inherit",transform:active?"translateY(-1px)":"none",transition:"all 0.1s"}}>
                  {m}
                </button>
              );
            })}
          </div>
          {/* Search/filter button */}
          <button onClick={()=>setShowSearch(s=>!s)} style={{flexShrink:0,background:showSearch?T.accent:T.accentLight,border:"none",borderRadius:7,color:showSearch?"#fff":T.accent,fontSize:14,cursor:"pointer",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}>🔍</button>
        </div>
        {/* Custom date range when search open */}
        {showSearch&&(
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{...inp,flex:1,padding:"5px 8px",fontSize:12}}/>
            <span style={{fontSize:10,color:T.muted,fontWeight:700}}>→</span>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{...inp,flex:1,padding:"5px 8px",fontSize:12}}/>
            <input placeholder="Search..." value={ledgerSearch} onChange={e=>setLedgerSearch(e.target.value)} style={{...inp,flex:1,padding:"5px 8px",fontSize:12}}/>
          </div>
        )}
      </div>
      <div style={{padding:16}}>
        {selected.length>0&&(
          <div style={{background:T.header,borderRadius:12,padding:"12px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"#aaa"}}>{selected.length} selected · Net: <span style={{color:Math.abs(selSum)<1?T.green:"#f87171"}}>{sign(selSum)}</span></div>
              <div style={{fontSize:12,color:"#fff",fontWeight:700,marginTop:2}}>{Math.abs(selSum)<1?"✓ Ready to match":"Entries must net to zero"}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setSelected([])} style={{...btnSm,background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:11}}>Clear</button>
              <button onClick={doMatch} style={{...btnSm,background:Math.abs(selSum)<1?T.green:"#555",color:"#fff",fontSize:11,opacity:Math.abs(selSum)<1?1:0.5}}>Match ✓</button>
            </div>
          </div>
        )}
        {matchedRows.length>0&&(
          <button onClick={()=>setShowMatched(s=>!s)} style={{...btnSm,marginBottom:10,fontSize:11}}>
            {showMatched?"▲ Hide":"▼ Show"} Matched ({matchedRows.length})
          </button>
        )}
        {showMatched&&<MatchedGroups matchedRows={matchedRows} getMovement={r=>r.movement}/>}
        <div style={{display:"grid",gridTemplateColumns:"24px 46px 42px 1fr 76px",gap:4,padding:"6px 6px",borderBottom:`2px solid ${T.border}`}}>
          {["","Bilag","Date","Description","Amount"].map(h=>(
            <div key={h} style={{fontSize:10,color:T.muted,fontWeight:700,textAlign:h==="Amount"?"right":"left",textTransform:"uppercase",letterSpacing:0.5}}>{h}</div>
          ))}
        </div>
        {rows.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:T.muted}}><div style={{fontSize:32,marginBottom:8}}>📭</div><div style={{fontSize:13,fontWeight:600}}>No transactions in this period</div></div>}
        {rows.map((r,i)=>{
          const isSel=selected.includes(r.id);const isRev=!!r.reversalOf;
          return(
            <div key={r.id} style={{display:"grid",gridTemplateColumns:"24px 46px 42px 1fr 76px",gap:4,padding:"9px 6px",borderBottom:`1px solid ${T.border}`,alignItems:"center",background:isSel?T.blueBg:i%2===0?"#fff":T.bg,borderLeft:isSel?`3px solid ${T.blue}`:"3px solid transparent"}}>
              <input type="checkbox" checked={isSel} onChange={()=>toggleSel(r.id)} style={{width:14,height:14,cursor:"pointer",accentColor:T.blue}}/>
              <div onClick={()=>setDetailTxn(r)} style={{fontSize:10,color:T.blue,fontWeight:800,cursor:"pointer",textDecoration:"underline dotted"}}>{fmtB(r.bilag)}</div>
              <div style={{fontSize:10,color:T.sub}}>{r.date.slice(5)}</div>
              <div style={{fontSize:12,color:isRev?T.red:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontStyle:isRev?"italic":"normal"}}>{r.description}</div>
              <div style={{fontSize:12,fontWeight:800,textAlign:"right",color:r.movement>=0?T.green:T.red}}>{r.movement>=0?"+":"−"}{fmt(r.movement)}</div>
            </div>
          );
        })}
      </div>
      {/* Footer inline after entries */}
      <div style={{background:"#fff",border:`1px solid ${T.border}`,padding:"12px 16px",marginTop:8,borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {label:"Opening",value:openingBal,color:T.sub},
            {label:"Period",value:periodMovement,color:periodMovement>=0?T.green:T.red},
            {label:"Closing",value:closingBal,color:closingBal>=0?T.accent:T.red}
          ].map((c,i)=>(
            <div key={i} style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:3}}>{c.label}</div>
              <div style={{fontSize:12,fontWeight:700,color:c.color}}>{sign(c.value)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Bank Module ──────────────────────────────────────────────────────────────

function BankModule({accounts,transactions,onOpenLedger,filterFrom,filterTo,attachments,onAttach}){
  const[viewing,setViewing]=useState(null);
  const banks=accounts.filter(a=>getSK(a.code)==="1900");

  const getBal=(code,beforeDate)=>transactions
    .filter(t=>!beforeDate||t.date<beforeDate)
    .reduce((s,t)=>{if(t.debitCode===code)return s+t.amount;if(t.creditCode===code)return s-t.amount;return s;},0);

  const getMovement=(code,f,t)=>transactions
    .filter(tx=>tx.date>=f&&tx.date<=t)
    .reduce((s,tx)=>{if(tx.debitCode===code)return s+tx.amount;if(tx.creditCode===code)return s-tx.amount;return s;},0);

  const handleAttach=(code,file)=>{
    const reader=new FileReader();
    reader.onload=e=>onAttach(code,{name:file.name,data:e.target.result,type:file.type});
    reader.readAsDataURL(file);
  };

  return(
    <div>
      {viewing&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:500,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(0,0,0,0.5)"}}>
            <div style={{fontSize:13,color:"#fff",fontWeight:600}}>{viewing.name}</div>
            <button onClick={()=>setViewing(null)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"#fff",fontSize:14,cursor:"pointer",padding:"6px 14px",fontWeight:600}}>✕ Close</button>
          </div>
          {viewing.type&&viewing.type.startsWith("image")
            ?<img src={viewing.data} style={{flex:1,objectFit:"contain",padding:10}}/>
            :<iframe src={viewing.data} style={{flex:1,border:"none",background:"#fff"}}/>
          }
        </div>
      )}
      {banks.map(a=>{
        const opening=getBal(a.code,filterFrom);
        const movement=getMovement(a.code,filterFrom,filterTo);
        const closing=opening+movement;
        const att=attachments[a.code];
        return(
          <div key={a.code} style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{background:"linear-gradient(135deg,#1A3A6E,#0057B8)",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:1,marginBottom:2}}>{a.code}</div>
                <div style={{fontSize:16,fontWeight:800,color:"#fff"}}>{a.name}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <label style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"#fff",fontSize:11,cursor:"pointer",padding:"5px 10px",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                  📎 {att?"Replace":"Attach"}
                  <input type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handleAttach(a.code,e.target.files[0]);}}/>
                </label>
                {att&&<button onClick={()=>setViewing(att)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"#fff",fontSize:11,cursor:"pointer",padding:"5px 10px",fontWeight:600}}>👁 View</button>}
                <button style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer",padding:"5px 10px"}} onClick={()=>onOpenLedger(a)}>Ledger ›</button>
              </div>
            </div>
            {att&&<div style={{padding:"6px 16px",background:"rgba(0,87,184,0.06)",fontSize:11,color:T.blue,fontWeight:600}}>📎 {att.name}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr"}}>
              {[{label:"Opening",val:opening,color:T.sub},{label:"Movement",val:movement,color:movement>=0?T.green:T.red},{label:"Closing",val:closing,color:closing>=0?T.green:T.red}].map((col,i)=>(
                <div key={i} style={{padding:"12px 10px",textAlign:"center",borderRight:i<2?`1px solid ${T.border}`:"none"}}>
                  <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{col.label}</div>
                  <div style={{fontSize:13,fontWeight:800,color:col.color}}>{sign(col.val)}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
      {!banks.length&&<div style={{textAlign:"center",color:T.muted,padding:30,fontSize:13}}>No bank accounts found. Add accounts in the 1900s series.</div>}
    </div>
  );
}

// ─── Reskontro Screen ─────────────────────────────────────────────────────────

function ReskontroScreen({contacts,setContacts,transactions,matchTxns,editTxn,deleteTxn,accounts,onBack}){
  const[view,setView]=useState(null);
  const[reskontroTab,setReskontroTab]=useState("contacts"); // "contacts" | "aging"
  const[editingId,setEditingId]=useState(null);
  const[showNew,setShowNew]=useState(false);
  const[newName,setNewName]=useState("");
  const[selected,setSelected]=useState([]);
  const[showMatched,setShowMatched]=useState(false);
  const[detailTxn,setDetailTxn]=useState(null);
  const[periodFrom,setPeriodFrom]=useState(()=>`${new Date().getFullYear()}-01-01`);
  const[periodTo,setPeriodTo]=useState(new Date().toISOString().split("T")[0]);

  const toggleInactive=(id)=>{
    const updated=contacts.map(c=>c.id===id?{...c,inactive:!c.inactive}:c);
    setContacts(updated);
  };
  const hasTxns=(id)=>transactions.some(t=>t.contactId===id);

  const customers=contacts.filter(c=>c.type==="customer");
  const suppliers=contacts.filter(c=>c.type==="supplier");

  const nextId=type=>{
    const prefix=type==="customer"?"C":"S";
    const nums=contacts.filter(c=>c.type===type).map(c=>parseInt(c.id.slice(1))||0);
    return`${prefix}${String((nums.length?Math.max(...nums):0)+1).padStart(3,"0")}`;
  };

  const addContact=()=>{
    if(!newName.trim())return;
    setContacts(p=>[...p,{id:nextId(view),type:view,name:newName.trim(),notes:""}]);
    setNewName("");setShowNew(false);
  };

  const getContactTxns=cid=>transactions.filter(t=>t.contactId===cid);

  const mv=(t,code)=>t.debitCode===code?t.amount:t.creditCode===code?-t.amount:0;

  const doMatch=(ids,grpId)=>matchTxns(ids,grpId);



  const goBack=()=>{setView(null);setSelected([]);setShowMatched(false);setDetailTxn(null);setShowNew(false);setNewName("");setEditingId(null);};

  // ── Combined ledger view for all customers or all suppliers ──
  if(view){
    const list=view==="customer"?customers:suppliers;
    const isCustomer=view==="customer";
    const code=isCustomer?"1500":"2400";

    // All txns for this type in period — only AR/AP movements (1500 or 2400), sorted by contact then date
    const allTxns=transactions.filter(t=>{
      const c=contacts.find(x=>x.id===t.contactId);
      if(!c||c.type!==view)return false;
      if(t.date<periodFrom||t.date>periodTo)return false;
      // Only show entries that touch the AR (1500) or AP (2400) account
      return(t.debitCode===code||t.creditCode===code);
    }).sort((a,b)=>{
      const ca=contacts.find(x=>x.id===a.contactId);
      const cb=contacts.find(x=>x.id===b.contactId);
      const na=(ca&&ca.id)||"";const nb=(cb&&cb.id)||"";
      if(na!==nb)return na.localeCompare(nb);
      return a.date.localeCompare(b.date);
    });

    const openTxns=allTxns.filter(t=>!t.matchedWith);
    const matchedTxns=allTxns.filter(t=>!!t.matchedWith);

    const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
    const selSum=selected.reduce((s,id)=>{const t=openTxns.find(x=>x.id===id);return t?s+mv(t,code):s;},0);
    const doMatch=()=>{if(selected.length<2||Math.abs(selSum)>=1)return;doMatch(selected,Date.now().toString());setSelected([]);};

    const totalOpen=openTxns.reduce((s,t)=>s+mv(t,code),0);

    return(
      <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:80}}>
        {detailTxn&&<DetailModal txn={detailTxn} accounts={accounts} contacts={contacts}
          onEdit={u=>{editTxn(u);setDetailTxn(null);}}
          onDelete={id=>{deleteTxn(id);setDetailTxn(null);}}
          onReverse={()=>{}}
          onClose={()=>setDetailTxn(null)}/>}
        <BackHeader title={isCustomer?"Customers":"Suppliers"} sub={`RESKONTRO · ${isCustomer?"AR 1500":"AP 2400"}`} color={isCustomer?T.blue:T.red} onBack={goBack}/>

        {/* Period filter */}
        <div style={{background:"#fff",borderBottom:`1px solid ${T.border}`,padding:"10px 16px",display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:T.muted,fontWeight:700,minWidth:30}}>FROM</span>
          <input type="date" value={periodFrom} onChange={e=>setPeriodFrom(e.target.value)} style={{...inp,flex:1,padding:"7px 10px",fontSize:12}}/>
          <span style={{fontSize:11,color:T.muted,fontWeight:700}}>TO</span>
          <input type="date" value={periodTo} onChange={e=>setPeriodTo(e.target.value)} style={{...inp,flex:1,padding:"7px 10px",fontSize:12}}/>
        </div>

        {/* Summary bar */}
        <div style={{background:isCustomer?T.blueBg:T.redLight,padding:"10px 16px",borderBottom:`1px solid ${isCustomer?T.blue:T.red}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,color:isCustomer?T.blue:T.red,fontWeight:700}}>{list.length} {isCustomer?"customers":"suppliers"} · {openTxns.length} open entries</div>
          <div style={{fontSize:15,fontWeight:900,color:isCustomer?T.blue:T.red}}>{sign(totalOpen)}</div>
        </div>

        <div style={{padding:16}}>
          {/* Match bar */}
          {selected.length>0&&(
            <div style={{background:T.header,borderRadius:12,padding:"12px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:11,color:"#aaa"}}>{selected.length} selected · Net: <span style={{color:Math.abs(selSum)<1?T.green:"#f87171"}}>{sign(selSum)}</span></div>
                <div style={{fontSize:12,color:"#fff",fontWeight:700,marginTop:1}}>{Math.abs(selSum)<1?"✓ Ready to match":"Must net to zero"}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setSelected([])} style={{...btnSm,background:"rgba(255,255,255,0.15)",color:"#fff",fontSize:11}}>Clear</button>
                <button onClick={doMatch} style={{...btnSm,background:Math.abs(selSum)<1?T.green:"#555",color:"#fff",fontSize:11,opacity:Math.abs(selSum)<1?1:0.5}}>Match ✓</button>
              </div>
            </div>
          )}

          {/* Matched toggle */}
          {matchedTxns.length>0&&(
            <button onClick={()=>setShowMatched(s=>!s)} style={{...btnSm,marginBottom:10,fontSize:11}}>
              {showMatched?"▲ Hide":"▼ Show"} Matched ({matchedTxns.length})
            </button>
          )}
          {showMatched&&<MatchedGroups matchedRows={matchedTxns} getMovement={r=>mv(r,code)}/>}

          {/* Combined ledger table */}
          {openTxns.length===0&&<div style={{textAlign:"center",color:T.muted,padding:24,fontSize:13}}>No open entries in this period.</div>}
          {openTxns.length>0&&(
            <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,overflow:"hidden"}}>
              {/* Header */}
              <div style={{display:"grid",gridTemplateColumns:"22px 48px 46px 1fr 72px",gap:4,padding:"8px 10px",background:T.bg,borderBottom:`2px solid ${T.border}`}}>
                <div/>
                <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase"}}>Date</div>
                <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase"}}>Bilag</div>
                <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase"}}>Description</div>
                <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase",textAlign:"right"}}>Amount</div>
              </div>
              {(()=>{
                let lastCid=null;
                return openTxns.map((t,i)=>{
                  const m=mv(t,code);
                  const isSel=selected.includes(t.id);
                  const c=contacts.find(x=>x.id===t.contactId);
                  const cid=c?c.id:"";
                  const cname=c?c.name:"—";
                  const showHeader=cid!==lastCid;
                  if(showHeader)lastCid=cid;
                  return(
                    <React.Fragment key={t.id}>
                      {showHeader&&(
                        <div style={{padding:"7px 10px",background:isCustomer?T.blueBg:T.redLight,borderBottom:`1px solid ${isCustomer?T.blue+"33":T.red+"33"}`,display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:10,fontWeight:800,color:isCustomer?T.blue:T.red}}>{cid}</span>
                          <span style={{fontSize:12,fontWeight:700,color:T.text}}>{cname}</span>
                        </div>
                      )}
                      <div onClick={()=>toggleSel(t.id)} style={{display:"grid",gridTemplateColumns:"22px 48px 46px 1fr 72px",gap:4,padding:"10px 10px",borderBottom:i<openTxns.length-1?`1px solid ${T.border}`:"none",alignItems:"center",background:isSel?"#EBF4FF":"#fff",cursor:"pointer"}}>
                        <input type="checkbox" checked={isSel} onChange={()=>toggleSel(t.id)} onClick={e=>e.stopPropagation()} style={{width:13,height:13}}/>
                        <div style={{fontSize:10,color:T.sub}}>{t.date.slice(5)}</div>
                        <div onClick={e=>{e.stopPropagation();setDetailTxn(t);}} style={{fontSize:10,color:T.blue,fontWeight:800,cursor:"pointer",textDecoration:"underline dotted"}}>{fmtB(t.bilag)}</div>
                        <div style={{fontSize:12,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description}</div>
                        <div style={{fontSize:12,fontWeight:800,textAlign:"right",color:m>=0?T.green:T.red,whiteSpace:"nowrap"}}>{m>=0?"+":"−"}{fmt(m)}</div>
                      </div>
                    </React.Fragment>
                  );
                });
              })()}
              {/* Total row */}
              <div style={{display:"grid",gridTemplateColumns:"22px 48px 46px 1fr 72px",gap:4,padding:"10px 10px",background:T.bg,borderTop:`2px solid ${T.border}`}}>
                <div/><div/><div/>
                <div style={{fontSize:11,color:T.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Total</div>
                <div style={{fontSize:13,fontWeight:900,textAlign:"right",color:totalOpen>=0?T.green:T.red,whiteSpace:"nowrap"}}>{totalOpen>=0?"+":"−"}{fmt(totalOpen)}</div>
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:T.header,borderTop:"1px solid #2a3a5e",padding:"12px 16px",boxShadow:"0 -4px 20px rgba(0,0,0,0.2)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"#6C7A9C",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>{isCustomer?"Receivable":"Payable"}</div>
              <div style={{fontSize:13,fontWeight:800,color:totalOpen>=0?"#4ade80":T.red}}>{sign(totalOpen)}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9,color:"#6C7A9C",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>Contacts</div>
              <div style={{fontSize:13,fontWeight:800,color:"#93A8D0"}}>{list.length}</div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Reskontro home ──
  const today=new Date().toISOString().split("T")[0];
  const agingBuckets=(contactType)=>{
    const code=contactType==="customer"?"1500":"2400";
    return contacts.filter(c=>c.type===contactType).map(c=>{
      const txns=transactions.filter(t=>t.contactId===c.id&&(t.debitCode===code||t.creditCode===code));
      const bal=txns.reduce((s,t)=>t.debitCode===code?s+t.amount:s-t.amount,0);
      if(Math.abs(bal)<1)return null;
      // Find oldest unmatched txn date
      const unmatched=txns.filter(t=>!t.matchedWith).sort((a,b)=>a.date.localeCompare(b.date));
      const oldest=unmatched[0]?.date||today;
      const days=Math.floor((new Date(today)-new Date(oldest))/(1000*60*60*24));
      return{id:c.id,name:c.name,bal,days};
    }).filter(Boolean).sort((a,b)=>b.days-a.days);
  };

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto"}}>
      <BackHeader title="Reskontro" sub="SUBLEDGER" onBack={onBack}/>
      {/* Tabs */}
      <div style={{display:"flex",gap:4,padding:"10px 16px 0",background:"#fff",borderBottom:`1px solid ${T.border}`}}>
        {[["contacts","Contacts"],["aging","Aging Report"]].map(([id,label])=>(
          <button key={id} onClick={()=>setReskontroTab(id)} style={{padding:"7px 14px",border:"none",background:"none",fontSize:12,fontWeight:reskontroTab===id?700:500,color:reskontroTab===id?T.accent:T.muted,borderBottom:reskontroTab===id?`2px solid ${T.accent}`:"2px solid transparent",cursor:"pointer",fontFamily:"inherit",marginBottom:-1}}>{label}</button>
        ))}
      </div>
      <div style={{padding:16}}>
        {reskontroTab==="contacts"&&(
          <>
            <SL>Select Type</SL>
            {[
              {type:"customer",label:"Customers",sub:"Accounts Receivable · always posts to 1500",icon:"📥",color:T.accent,bg:T.accentLight,count:customers.filter(c=>!c.inactive).length},
              {type:"supplier",label:"Suppliers",sub:"Accounts Payable · always posts to 2400",icon:"📤",color:T.red,bg:T.redLight,count:suppliers.filter(c=>!c.inactive).length}
            ].map(item=>(
              <div key={item.type}>
                <div onClick={()=>setView(item.type)} style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:"18px 16px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                  <div style={{background:item.bg,borderRadius:12,width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{item.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:700}}>{item.label}</div>
                    <div style={{fontSize:11,color:T.sub,marginTop:2}}>{item.sub}</div>
                    <div style={{fontSize:11,color:item.color,fontWeight:600,marginTop:4}}>{item.count} active contacts</div>
                  </div>
                  <span style={{fontSize:20,color:T.muted}}>›</span>
                </div>
                {/* Inactive contacts for this type */}
                {contacts.filter(c=>c.type===item.type&&c.inactive).map(c=>(
                  <div key={c.id} style={{background:"#f9f9f9",borderRadius:10,border:`1px solid ${T.border}`,padding:"10px 14px",marginBottom:6,marginLeft:8,display:"flex",alignItems:"center",gap:10,opacity:0.6}}>
                    <span style={{fontSize:10,fontWeight:800,color:T.muted,background:T.border,padding:"2px 7px",borderRadius:5}}>{c.id}</span>
                    <span style={{fontSize:12,color:T.muted,flex:1,textDecoration:"line-through"}}>{c.name}</span>
                    <span style={{fontSize:9,fontWeight:800,color:T.muted,background:T.border,borderRadius:5,padding:"2px 6px"}}>INACTIVE</span>
                    <button onClick={()=>toggleInactive(c.id)} style={{fontSize:10,background:T.accentLight,color:T.accent,border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>Reactivate</button>
                  </div>
                ))}
              </div>
            ))}
          </>
        )}
        {reskontroTab==="aging"&&(
          <div>
            {[{type:"customer",label:"Receivables (AR)",color:T.accent},{type:"supplier",label:"Payables (AP)",color:T.red}].map(({type,label,color})=>{
              const rows=agingBuckets(type);
              return(
                <div key={type} style={{marginBottom:20}}>
                  <SL>{label}</SL>
                  {rows.length?(
                    rows.map(r=>{
                      const bucket=r.days<=30?"0-30d":r.days<=60?"31-60d":r.days<=90?"61-90d":"90d+";
                      const bucketColor=r.days<=30?T.green:r.days<=60?T.orange:T.red;
                      return(
                        <div key={r.id} style={{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,padding:"11px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div>
                            <div style={{fontSize:13,fontWeight:600,color:T.text}}>{r.name}</div>
                            <div style={{fontSize:10,color:T.muted,marginTop:2}}>{r.days} days outstanding</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontSize:13,fontWeight:800,color}}>{fmt(r.bal)}</div>
                            <span style={{fontSize:9,fontWeight:700,color:bucketColor,background:r.days<=30?T.greenBg:r.days<=60?T.orangeBg:T.redLight,borderRadius:5,padding:"1px 6px"}}>{bucket}</span>
                          </div>
                        </div>
                      );
                    })
                  ):<div style={{textAlign:"center",color:T.muted,padding:20,fontSize:13}}>No outstanding {label}</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function AccountPlanScreen({accounts,onSave,onBack}){
  const[list,setList]=useState(accounts.map(a=>({...a})));
  const[editingIdx,setEditingIdx]=useState(null);
  const[newAcc,setNewAcc]=useState({code:"",name:""});
  const[showNew,setShowNew]=useState(false);
  const[search,setSearch]=useState("");
  const filtered=list.filter(a=>a.code.includes(search)||a.name.toLowerCase().includes(search.toLowerCase()));
  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto"}}>
      <BackHeader title="Account Plan" sub="SETTINGS" onBack={onBack}/>
      <div style={{padding:16}}>
        <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,marginBottom:12}}/>
        <button style={{...btnRed,marginBottom:14}} onClick={()=>setShowNew(s=>!s)}>{showNew?"✕ Cancel":"+ New Account"}</button>
        {showNew&&<Card style={{marginBottom:14}}><SL>New Account</SL><div style={{display:"flex",flexDirection:"column",gap:10}}><input placeholder="Code e.g. 4005" value={newAcc.code} onChange={e=>setNewAcc(p=>({...p,code:e.target.value}))} style={inp}/><input placeholder="Name e.g. Office Supplies" value={newAcc.name} onChange={e=>setNewAcc(p=>({...p,name:e.target.value}))} style={inp}/><div style={{fontSize:11,color:T.muted,background:T.bg,borderRadius:8,padding:"8px 12px",lineHeight:1.7}}>1000s=Assets · 1500=AR · 1900s=Bank · 2000s=Equity · 2400=AP · 3000s=Income · 4000s=Expenses</div><button style={btnRed} onClick={()=>{if(!newAcc.code||!newAcc.name)return;const updated=[...list,{...newAcc}];setList(updated);onSave(updated);setNewAcc({code:"",name:""});setShowNew(false);}}>Add Account</button></div></Card>}
        {Object.entries(SERIES).map(([key,s])=>{
          const grp=filtered.filter(a=>getSK(a.code)===key).sort((a,b)=>a.code.localeCompare(b.code));
          if(!grp.length)return null;
          return(<div key={key} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span>{s.icon}</span><span style={{fontSize:12,fontWeight:800,color:s.color,textTransform:"uppercase"}}>{s.name}</span></div>
            {grp.map(a=>{const ri=list.findIndex(x=>x.code===a.code);const isE=editingIdx===ri;return(
              <div key={a.code} style={{background:T.card,borderRadius:12,border:`1px solid ${T.border}`,padding:"12px 14px",marginBottom:6}}>
                {isE?(<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8}}><input value={list[ri].code} onChange={e=>{const n=[...list];n[ri]={...n[ri],code:e.target.value};setList(n);}} style={{...inp,fontSize:13}}/><input value={list[ri].name} onChange={e=>{const n=[...list];n[ri]={...n[ri],name:e.target.value};setList(n);}} style={{...inp,fontSize:13}}/></div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={{...btnRed,flex:2,padding:"8px"}} onClick={()=>{onSave(list);setEditingIdx(null);}}>✓ Done</button>
                    <button style={{...btnGhost,flex:1,padding:"8px"}} onClick={()=>{setList(accounts.map(a=>({...a})));setEditingIdx(null);}}>Cancel</button>
                  </div>
                </div>):(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{background:s.bg,color:s.color,borderRadius:7,padding:"4px 9px",fontSize:12,fontWeight:800}}>{a.code}</span><span style={{fontSize:13,fontWeight:600}}>{a.name}</span></div>
                    <button style={btnSm} onClick={()=>setEditingIdx(ri)}>✏️ Edit</button>
                  </div>
                )}
              </div>
            );})}
          </div>);
        })}
        <div style={{display:"flex",gap:8,marginTop:8}}><button style={{...btnGhost,padding:"10px 14px",fontSize:12}} onClick={onBack}>← Back</button></div>
      </div>
    </div>
  );
}

function SettingsMenu({accounts,onSave,contacts,setContacts,transactions,sinkingFunds,onBack}){
  const[screen,setScreen]=useState(null);
  const[contactType,setContactType]=useState("customer");
  const[newName,setNewName]=useState("");
  const[showNew,setShowNew]=useState(false);

  const nextId=type=>{
    const prefix=type==="customer"?"C":"S";
    const nums=contacts.filter(c=>c.type===type).map(c=>parseInt(c.id.slice(1))||0);
    return`${prefix}${String((nums.length?Math.max(...nums):0)+1).padStart(3,"0")}`;
  };
  const addContact=()=>{
    if(!newName.trim())return;
    setContacts([...contacts,{id:nextId(contactType),type:contactType,name:newName.trim(),notes:""}]);
    setNewName("");setShowNew(false);
  };
  const deleteContact=id=>setContacts(contacts.filter(c=>c.id!==id));

  if(screen==="periodclose")return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      <BackHeader title="Period Close" sub="SETTINGS" onBack={()=>setScreen(null)}/>
      <div style={{padding:16}}>
        <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:"16px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:6}}>Close Period Until</div>
          <div style={{fontSize:12,color:T.muted,marginBottom:14,lineHeight:1.6}}>No entries can be added or edited on or before the selected date. You can only move the date backwards to re-open a closed period.</div>
          <input type="date" value={periodClose} max={new Date().toISOString().slice(0,10)}
            onChange={e=>{
              const newDate=e.target.value;
              if(!periodClose||newDate<periodClose||window.confirm(`Move period close date to ${newDate}? This will re-open entries between ${newDate} and ${periodClose}.`)){
                savePeriodClose(newDate);
              }
            }}
            style={{...inp,marginBottom:12}}/>
          {periodClose?(
            <>
              <div style={{background:"#FEF3C7",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontSize:16}}>🔒</span>
                <span style={{fontSize:12,fontWeight:600,color:T.orange}}>Period closed up to {periodClose}</span>
              </div>
              <button style={btnRed} onClick={()=>savePeriodClose("")}>Save / Confirm</button>
            </>
          ):(
            <button style={btnRed} onClick={()=>{}}>Save Period Close</button>
          )}
        </div>
      </div>
    </div>
  );

  if(screen==="backup")return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      <BackHeader title="Backup & Restore" sub="DATA" onBack={()=>setScreen(null)}/>
      <div style={{padding:16}}>
        <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:"16px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:6}}>💾 Export Backup</div>
          <div style={{fontSize:12,color:T.muted,marginBottom:12,lineHeight:1.6}}>Downloads all your data as a single JSON file — transactions, accounts, contacts, sinking funds, budgets and profile.</div>
          <button style={btnRed} onClick={()=>{
            try{
              const budgets=JSON.parse(localStorage.getItem("rr_budgets")||"{}");
              const sf=JSON.parse(localStorage.getItem("rr_sf")||"[]");
              const profile=JSON.parse(localStorage.getItem("rr_profile")||"{}");
              const backup={version:2,date:new Date().toISOString(),accounts,contacts,sinkingFunds:sf,budgets,profile};
              const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
              const url=URL.createObjectURL(blob);
              const a=document.createElement("a");
              a.href=url;a.download=`redrock_backup_${new Date().toISOString().slice(0,10)}.json`;
              document.body.appendChild(a);a.click();
              setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
            }catch(e){alert("Backup failed: "+e.message);}
          }}>⬇ Download Backup</button>
        </div>
        <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:"16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:6}}>📥 Restore from Backup</div>
          <div style={{fontSize:12,color:T.muted,marginBottom:12,lineHeight:1.6}}>Select a previously exported JSON backup file. This will restore accounts, contacts, sinking funds, budgets and profile.</div>
          <label style={{display:"flex",alignItems:"center",gap:8,background:T.accentLight,border:`1px solid ${T.accentMid}`,borderRadius:10,padding:"12px 14px",cursor:"pointer",fontSize:13,color:T.accent,fontWeight:600}}>
            📂 Choose backup file
            <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
              const file=e.target.files[0];if(!file)return;
              const r=new FileReader();
              r.onload=ev=>{
                try{
                  const data=JSON.parse(ev.target.result);
                  if(!data.version)throw new Error("Not a valid backup file");
                  if(!window.confirm(`Restore backup from ${data.date?.slice(0,10)}?\nThis will overwrite current accounts, contacts, budgets, sinking funds and profile.`))return;
                  if(data.accounts&&data.accounts.length){onSave(data.accounts);}
                  if(data.contacts&&data.contacts.length){setContacts(data.contacts);}
                  if(data.budgets){try{localStorage.setItem("rr_budgets",JSON.stringify(data.budgets));}catch{}}
                  if(data.sinkingFunds){try{localStorage.setItem("rr_sf",JSON.stringify(data.sinkingFunds));}catch{}}
                  if(data.profile){try{localStorage.setItem("rr_profile",JSON.stringify(data.profile));}catch{}}
                  alert("✅ Restore complete! Accounts, contacts, budgets and profile restored.");
                  setScreen(null);
                }catch(err){alert("Restore failed: "+err.message);}
              };
              r.readAsText(file);
            }}/>
          </label>
        </div>
      </div>
    </div>
  );

  const[periodClose,setPeriodCloseState]=useState(()=>localStorage.getItem(PERIOD_CLOSE_KEY)||"");
  const savePeriodClose=(d)=>{setPeriodCloseState(d);if(d)localStorage.setItem(PERIOD_CLOSE_KEY,d);else localStorage.removeItem(PERIOD_CLOSE_KEY);};

  if(screen==="plan")return(<AccountPlanScreen accounts={accounts} onSave={onSave} onBack={()=>setScreen(null)}/>);
  if(screen==="contacts")return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      <BackHeader title="Manage Contacts" sub="RESKONTRO · SETTINGS" onBack={()=>{setScreen(null);}}/>
      <div style={{padding:16}}>
        <div style={{fontSize:12,color:T.muted,marginBottom:12}}>To add or manage contacts, go to Reskontro → Contacts tab.</div>
        <button onClick={()=>setScreen(null)} style={btnRed}>← Back to Settings</button>
      </div>
    </div>
  );

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto"}}>
      <BackHeader title="Settings" sub="REDROCK ACCOUNTING" onBack={onBack}/>
      <div style={{padding:16}}>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
          {[{label:"Accounts",val:accounts.length,icon:"📒"},{label:"Contacts",val:contacts.length,icon:"👥"},{label:"Currency",val:"PKR",icon:"🏛️"}].map((s,i)=>(
            <div key={i} style={{background:T.card,borderRadius:12,padding:"14px 8px",textAlign:"center",border:`1px solid ${T.border}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
              <div style={{fontSize:15,fontWeight:800,color:T.text}}>{s.val}</div>
              <div style={{fontSize:9,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* All settings as navigation cards */}
        {[
          {icon:"📋",label:"Account Plan",sub:"Edit chart of accounts",action:()=>setScreen("plan"),bg:T.accentLight,color:T.accent},
          {icon:"👥",label:"Manage Contacts",sub:"Customers & suppliers",action:()=>setScreen("contacts"),bg:T.redLight,color:T.red},
          {icon:"🔒",label:"Period Close",sub:periodClose?`Closed up to ${periodClose}`:"No period locked",action:()=>setScreen("periodclose"),bg:"#FEF3C7",color:T.orange},
          {icon:"💾",label:"Backup & Restore",sub:"Export or import all data",action:()=>setScreen("backup"),bg:T.greenBg,color:T.green},
        ].map((item,i)=>(
          <div key={i} onClick={item.action} style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:"14px 16px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
            <div style={{background:item.bg,borderRadius:12,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{item.icon}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.text}}>{item.label}</div><div style={{fontSize:11,color:T.sub,marginTop:1}}>{item.sub}</div></div>
            <span style={{fontSize:18,color:T.muted}}>›</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function BankSlider({accounts,transactions,filterFrom,filterTo}){
  const banks=accounts.filter(a=>getSK(a.code)==="1900");
  if(!banks.length)return null;
  const bals=banks.map(a=>({
    ...a,
    bal:transactions.filter(t=>t.date>=filterFrom&&t.date<=filterTo).reduce((s,t)=>{if(t.debitCode===a.code)return s+t.amount;if(t.creditCode===a.code)return s-t.amount;return s;},0)
  })).filter(a=>a.bal!==0);
  if(!bals.length)return null;
  return(
    <div style={{marginBottom:14,marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16}}>
      <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4,paddingRight:16,scrollbarWidth:"none",msOverflowStyle:"none"}}>
        {bals.map(a=>(
          <div key={a.code} style={{minWidth:140,flexShrink:0,background:"linear-gradient(140deg,#1A3A6E,#0057B8)",borderRadius:16,padding:"14px 14px 16px",boxShadow:"0 4px 14px rgba(0,87,184,0.2)"}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.5)",fontWeight:700,letterSpacing:1.2,marginBottom:3,textTransform:"uppercase"}}>{a.code}</div>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.85)",marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.name}</div>
            <div style={{fontSize:18,fontWeight:900,color:a.bal>=0?"#4ade80":"#f87171",letterSpacing:-0.5}}>{sign(a.bal)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Global Period Selector ────────────────────────────────────────────────────
function PeriodSelector({from,to,onChange}){
  const now=new Date();
  const curY=now.getFullYear();
  const[selYear,setSelYear]=useState(parseInt(from.slice(0,4))||curY);
  const[showCustom,setShowCustom]=useState(false);
  const[customFrom,setCustomFrom]=useState(from);
  const[customTo,setCustomTo]=useState(to);
  const moRef=React.useRef(null);
  const MNAMES=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const years=[2023,2024,2025,2026,2027,2028];

  const fromYear=parseInt(from.slice(0,4));
  const fromMonth=parseInt(from.slice(5,7))-1;
  const isFullYear=from.endsWith("-01-01")&&to.endsWith("-12-31")&&fromYear===parseInt(to.slice(0,4));
  const isSingleMonth=!isFullYear&&fromYear===parseInt(to.slice(0,4))&&fromMonth===(parseInt(to.slice(5,7))-1);

  // Scroll active month into view
  useEffect(()=>{
    if(!moRef.current||!isSingleMonth)return;
    const btns=moRef.current.querySelectorAll("button");
    if(btns[fromMonth]){
      const btn=btns[fromMonth];
      const c=moRef.current;
      c.scrollTo({left:btn.offsetLeft-(c.clientWidth/2)+(btn.offsetWidth/2),behavior:"smooth"});
    }
  },[fromMonth,isSingleMonth]);

  // Year: always sets full year. If already full year for same year, keep it (no-op visually but fires onChange to refresh)
  const selectYear=(y)=>{
    setSelYear(y);
    onChange(`${y}-01-01`,`${y}-12-31`);
    setShowCustom(false);
  };
  const selectMonth=(i)=>{
    const mm=String(i+1).padStart(2,"0");
    const lastDay=new Date(selYear,i+1,0).getDate();
    onChange(`${selYear}-${mm}-01`,`${selYear}-${mm}-${String(lastDay).padStart(2,"0")}`);
    setShowCustom(false);
  };
  const applyCustom=()=>{if(customFrom&&customTo){onChange(customFrom,customTo);setShowCustom(false);}};

  // Month button width sized so ~3.5 fit in container
  const MON_W=34; // inactive px width incl gap
  const MON_W_ACT=38;

  return(
    <div style={{background:"#fff",borderBottom:`1px solid ${T.border}`}}>
      <div style={{display:"flex",alignItems:"center",padding:"7px 12px",gap:8}}>
        {/* Year — compact left */}
        <select
          value={selYear}
          onChange={e=>selectYear(parseInt(e.target.value))}
          style={{flexShrink:0,fontSize:12,fontWeight:700,color:isFullYear?"#fff":T.text,background:isFullYear?T.red:"#f3f4f6",border:"none",borderRadius:8,padding:"5px 8px",cursor:"pointer",fontFamily:"inherit",outline:"none"}}
        >
          {years.map(y=><option key={y} value={y}>{y}</option>)}
        </select>

        {/* Month strip — scrollable, fixed ~3.5 wide */}
        <div ref={moRef} style={{flex:1,display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none",alignItems:"center",paddingBottom:2}}>
          {MNAMES.map((name,i)=>{
            const active=isSingleMonth&&fromMonth===i&&fromYear===selYear;
            return(
              <button key={i} onClick={()=>selectMonth(i)} style={{
                flexShrink:0,width:active?MON_W_ACT:MON_W,height:26,
                borderRadius:8,border:`1.5px solid ${active?T.accent:T.border}`,
                background:active?T.accent:"#fff",color:active?"#fff":T.sub,
                fontSize:11,fontWeight:active?700:400,
                cursor:"pointer",fontFamily:"inherit",
                transform:active?"translateY(-2px)":"none",
                transition:"all 0.12s ease",
                boxShadow:active?"0 2px 6px rgba(13,115,119,0.3)":"none",
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>{name}</button>
            );
          })}
        </div>

        {/* Custom button — right side */}
        <button onClick={()=>setShowCustom(s=>!s)} style={{flexShrink:0,padding:"4px 10px",borderRadius:8,border:`1.5px solid ${showCustom?T.blue:T.border}`,background:showCustom?T.blueBg:"#fff",color:showCustom?T.blue:T.sub,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>Custom</button>
      </div>
      {showCustom&&(
        <div style={{padding:"6px 12px 10px",borderTop:`1px solid ${T.border}`,display:"flex",gap:6,alignItems:"center"}}>
          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} style={{...selSm,flex:1,padding:"5px 8px",fontSize:12}}/>
          <span style={{fontSize:10,color:T.muted,fontWeight:700}}>→</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} style={{...selSm,flex:1,padding:"5px 8px",fontSize:12}}/>
          <button onClick={applyCustom} style={{background:T.blue,color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>OK</button>
        </div>
      )}
    </div>
  );
}


function Dashboard({transactions,accounts,filterFrom,filterTo,setFilterFrom,setFilterTo,onNavigate,feat={}}){
  const getName=code=>((accounts.find(a=>a.code===code))||{name:code}).name;
  const[kpiSlide,setKpiSlide]=useState(0); // 0=income, 1=expense
  const[overviewTab,setOverviewTab]=useState("budget");

  const periodTxns=useMemo(()=>transactions.filter(t=>t.date>=filterFrom&&t.date<=filterTo),[transactions,filterFrom,filterTo]);
  const totalIncome=useMemo(()=>periodTxns.filter(t=>getSK(t.creditCode)==="3000").reduce((s,t)=>s+t.amount,0),[periodTxns]);
  const totalExpenses=useMemo(()=>periodTxns.filter(t=>getSK(t.debitCode)==="4000").reduce((s,t)=>s+t.amount,0),[periodTxns]);
  const net=totalIncome-totalExpenses;

  // Previous period for % change
  const periodMs=new Date(filterTo)-new Date(filterFrom);
  const prevTo=new Date(new Date(filterFrom)-1).toISOString().split("T")[0];
  const prevFrom=new Date(new Date(filterFrom)-periodMs-1).toISOString().split("T")[0];
  const prevTxns=useMemo(()=>transactions.filter(t=>t.date>=prevFrom&&t.date<=prevTo),[transactions,prevFrom,prevTo]);
  const prevIncome=useMemo(()=>prevTxns.filter(t=>getSK(t.creditCode)==="3000").reduce((s,t)=>s+t.amount,0),[prevTxns]);
  const prevExpenses=useMemo(()=>prevTxns.filter(t=>getSK(t.debitCode)==="4000").reduce((s,t)=>s+t.amount,0),[prevTxns]);
  const incomePct=prevIncome>0?Math.round(((totalIncome-prevIncome)/prevIncome)*100):null;
  const expensePct=prevExpenses>0?Math.round(((totalExpenses-prevExpenses)/prevExpenses)*100):null;

  const cashBal=useMemo(()=>accounts.filter(a=>getSK(a.code)==="1900").reduce((s,a)=>s+transactions.reduce((ss,t)=>{if(t.debitCode===a.code)return ss+t.amount;if(t.creditCode===a.code)return ss-t.amount;return ss;},0),0),[accounts,transactions]);
  const arBal=useMemo(()=>transactions.reduce((s,t)=>{if(t.debitCode==="1500")return s+t.amount;if(t.creditCode==="1500")return s-t.amount;return s;},0),[transactions]);
  const apBal=useMemo(()=>transactions.reduce((s,t)=>{if(t.debitCode==="2400")return s+t.amount;if(t.creditCode==="2400")return s-t.amount;return s;},0),[transactions]);

  // Budget data
  const BKEY="rr_budgets";
  const budgets=useMemo(()=>{try{return JSON.parse(localStorage.getItem(BKEY)||"{}")}catch{return{};}});
  const expAccounts=accounts.filter(a=>getSK(a.code)==="4000");
  const totalBudget=expAccounts.reduce((s,a)=>s+(budgets[a.code]||0),0);
  const totalActual=expAccounts.reduce((s,a)=>s+periodTxns.filter(t=>t.debitCode===a.code).reduce((ss,t)=>ss+t.amount,0),0);
  const budgetPct=totalBudget>0?Math.min(100,Math.round((totalActual/totalBudget)*100)):0;

  // Sinking funds
  const sfData=useMemo(()=>{try{const s=localStorage.getItem("rr_sf");return s?JSON.parse(s):[];}catch{return[];}});
  const totalSaved=sfData.reduce((s,f)=>s+(f.saved||0),0);
  const totalGoal=sfData.reduce((s,f)=>s+(f.goal||0),0);
  const sfPct=totalGoal>0?Math.min(100,Math.round((totalSaved/totalGoal)*100)):0;

  // Income/expense comparison bar pct
  const total=totalIncome+totalExpenses;
  const incPct=total>0?Math.round((totalIncome/total)*100):50;

  const PctBadge=({pct,invert=false})=>{
    if(pct===null)return null;
    const good=invert?(pct<=0):(pct>=0);
    return <span style={{fontSize:10,fontWeight:700,color:good?T.green:T.red,background:good?T.greenBg:T.redLight,borderRadius:6,padding:"2px 6px"}}>{pct>=0?"+":""}{pct}%</span>;
  };

  // Touch swipe for income/expense cards
  const slideRef=React.useRef(null);
  const touchStartX=React.useRef(null);
  const onTouchStart=(e)=>{touchStartX.current=e.touches[0].clientX;};
  const onTouchEnd=(e)=>{
    if(touchStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX.current;
    if(Math.abs(dx)>40){setKpiSlide(dx<0?1:0);}
    touchStartX.current=null;
  };

  return(
    <div>
      {/* 1 ── Swipeable Income / Expense cards ── */}
      <div ref={slideRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{marginBottom:12,position:"relative",userSelect:"none"}}>
        {/* Cards container */}
        <div style={{overflow:"hidden",borderRadius:18}}>
          <div style={{display:"flex",transition:"transform 0.3s ease",transform:`translateX(${kpiSlide*-100}%)`}}>
            {/* Income card */}
            <div style={{minWidth:"100%",background:`linear-gradient(135deg,${T.accent},#0A9396)`,borderRadius:18,padding:"20px 18px",boxShadow:`0 6px 20px rgba(13,115,119,0.25)`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Total Income</div>
                <PctBadge pct={incomePct}/>
              </div>
              <div style={{fontSize:30,fontWeight:900,color:"#fff",letterSpacing:-1,marginBottom:10}}>+{fmt(totalIncome)}</div>
              <div style={{background:"rgba(255,255,255,0.15)",borderRadius:6,height:5,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${incPct}%`,height:"100%",background:"rgba(255,255,255,0.8)",borderRadius:6}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>vs expenses: {fmt(totalExpenses)}</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.8)",fontWeight:700}}>Net {sign(net)}</span>
              </div>
            </div>
            {/* Expense card */}
            <div style={{minWidth:"100%",background:"linear-gradient(135deg,#B45309,#D97706)",borderRadius:18,padding:"20px 18px",boxShadow:"0 6px 20px rgba(180,83,9,0.25)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.6)",fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Total Expenses</div>
                <PctBadge pct={expensePct} invert/>
              </div>
              <div style={{fontSize:30,fontWeight:900,color:"#fff",letterSpacing:-1,marginBottom:10}}>−{fmt(totalExpenses)}</div>
              <div style={{background:"rgba(255,255,255,0.15)",borderRadius:6,height:5,overflow:"hidden",marginBottom:8}}>
                <div style={{width:`${100-incPct}%`,height:"100%",background:"rgba(255,255,255,0.8)",borderRadius:6}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.6)"}}>vs income: {fmt(totalIncome)}</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.8)",fontWeight:700}}>{totalIncome>0?Math.round((totalExpenses/totalIncome)*100):"—"}% of income</span>
              </div>
            </div>
          </div>
        </div>
        {/* Dot indicators */}
        <div style={{display:"flex",justifyContent:"center",gap:5,marginTop:8}}>
          {[0,1].map(i=>(
            <div key={i} onClick={()=>setKpiSlide(i)} style={{width:i===kpiSlide?16:6,height:6,borderRadius:3,background:i===kpiSlide?T.accent:T.border,cursor:"pointer",transition:"all 0.2s"}}/>
          ))}
        </div>
      </div>

      {/* 2 ── Bank cards slider ── */}
      <BankSlider accounts={accounts} transactions={transactions} filterFrom={filterFrom} filterTo={filterTo}/>

      {/* 3 ── KPI row: Cash, AR, AP ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {label:"Cash & Bank",val:cashBal,color:T.accent,icon:"🏦",nav:null},
          {label:"Receivables",val:arBal,color:T.green,icon:"📥",nav:"ledger_1500"},
          {label:"Payables",val:Math.abs(apBal),color:T.red,icon:"📤",nav:"ledger_2400"},
        ].map((c,i)=>(
          <div key={i} onClick={c.nav?()=>onNavigate(c.nav):undefined} style={{background:"#fff",borderRadius:14,padding:"12px 10px",border:`1px solid ${T.border}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",cursor:c.nav?"pointer":"default"}}>
            <div style={{fontSize:15,marginBottom:5}}>{c.icon}</div>
            <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>{c.label}</div>
            <div style={{fontSize:13,fontWeight:800,color:c.color}}>{fmt(c.val)}</div>
          </div>
        ))}
      </div>

      {/* 4 ── Net P/L ── */}
      <div style={{background:"#fff",borderRadius:14,border:`1px solid ${T.border}`,padding:"12px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
        <div>
          <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:3}}>Net Profit / Loss</div>
          <div style={{fontSize:22,fontWeight:900,color:net>=0?T.green:T.red}}>{sign(net)}</div>
        </div>
        <div style={{background:net>=0?T.greenBg:T.redLight,borderRadius:12,padding:"8px 14px",textAlign:"center"}}>
          <div style={{fontSize:9,color:T.muted,fontWeight:700,marginBottom:1}}>MARGIN</div>
          <div style={{fontSize:20,fontWeight:900,color:net>=0?T.green:T.red}}>{totalIncome>0?`${Math.round((net/totalIncome)*100)}%`:"—"}</div>
        </div>
      </div>

      
      {/* ── Budget / Sinking / Analytics tabs ── */}
      {(feat.budget!==false||feat.sinkingFunds!==false)&&(
        <div style={{background:"#fff",borderRadius:16,border:`1px solid ${T.border}`,overflow:"hidden",marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
          <div style={{display:"flex",borderBottom:`1px solid ${T.border}`}}>
            {[
              feat.budget!==false&&{id:"budget",label:"💰 Budget",nav:"Budget"},
              feat.sinkingFunds!==false&&{id:"sinking",label:"🎯 Sinking",nav:"SinkingFunds"},
              {id:"analytics",label:"📈 Analytics",nav:null}
            ].filter(Boolean).map(t=>(

                </div>
                <div style={{background:T.border,borderRadius:6,height:7,overflow:"hidden"}}>

                </div>
              </div>
            )}
            {feat.sinkingFunds!==false&&sfData.length>0&&(
