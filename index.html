function SinkingFundsScreen({onBack,sinkingFunds,saveSinkingFunds}){
  const[funds,setFunds]=useState((sinkingFunds&&sinkingFunds.length>0)?sinkingFunds:INIT_SF);
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({name:"",goal:"",saved:"",icon:"🎯",color:"#0057B8",months:""});
  const[addAmt,setAddAmt]=useState({});
  const[menuOpen,setMenuOpen]=useState(false);
  const[cardMenu,setCardMenu]=useState(null);

  const totalGoal=funds.reduce((s,f)=>s+f.goal,0);
  const totalSaved=funds.reduce((s,f)=>s+f.saved,0);
  const overallPct=totalGoal>0?Math.min(Math.round((totalSaved/totalGoal)*100),100):0;

  const openNew=()=>{setForm({name:"",goal:"",saved:"",icon:"🎯",color:"#0057B8",months:""});setEditId(null);setShowForm(true);setMenuOpen(false);setCardMenu(null);};
  const openEdit=f=>{setForm({name:f.name,goal:String(f.goal),saved:String(f.saved),icon:f.icon,color:f.color,months:String(f.months||"")});setEditId(f.id);setShowForm(true);setMenuOpen(false);setCardMenu(null);};
  const deleteFund=id=>{const newList=funds.filter(f=>f.id!==id);setFunds(newList);saveSinkingFunds(newList);setCardMenu(null);};
  const cancelForm=()=>{setShowForm(false);setEditId(null);};

  const save=()=>{
    if(!form.name.trim()||!parseFloat(form.goal))return;
    const savedVal=form.saved!==""?parseFloat(form.saved):0;
    const monthsVal=form.months?parseInt(form.months):null;
    if(editId){
      const updated=funds.map(f=>f.id===editId?{...f,name:form.name,goal:parseFloat(form.goal),saved:savedVal,icon:form.icon,color:form.color,months:monthsVal}:f);
      setFunds(updated);
      saveSinkingFunds(updated);
    } else {
      const id="SF"+String(funds.length+1).padStart(3,"0");
      const newList=[...funds,{id,name:form.name,goal:parseFloat(form.goal),saved:savedVal,icon:form.icon,color:form.color,months:monthsVal}];
      setFunds(newList);
      saveSinkingFunds(newList);
    }
    cancelForm();
  };

  const deposit=(id)=>{
    const amt=parseFloat(addAmt[id]||"0");
    if(!amt||amt<=0)return;
    const newList=funds.map(f=>f.id===id?{...f,saved:Math.min(f.saved+amt,f.goal)}:f);
    setFunds(newList);
    saveSinkingFunds(newList);
    setAddAmt(p=>({...p,[id]:""}));
  };

  const COLORS=["#00875A","#0057B8","#7C3AED","#B45309","#D0021B","#1D4ED8"];
  const ICONS=["🛡️","🚗","✈️","🏠","📚","💍","🎯","🏖️","🏥","💻"];

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      {(menuOpen||cardMenu)&&<div onClick={()=>{setMenuOpen(false);setCardMenu(null);}} style={{position:"fixed",inset:0,zIndex:90}}/>}

      {/* Header */}
      <div style={{background:T.header,padding:"16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:10,color:"#fff",fontSize:20,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"#6C7A9C",fontWeight:700,letterSpacing:1}}>SAVINGS GOALS</div>
          <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>Sinking Funds</div>
        </div>
        <div style={{position:"relative"}}>
          <button onClick={()=>setMenuOpen(o=>!o)} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:10,color:"#fff",fontSize:16,cursor:"pointer",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>•••</button>
          {menuOpen&&(
            <div style={{position:"absolute",right:0,top:44,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,zIndex:100,minWidth:160,boxShadow:"0 8px 32px rgba(0,0,0,0.14)"}}>
              <div onClick={openNew} style={{padding:"13px 16px",fontSize:13,cursor:"pointer",color:T.blue,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>➕ Add New Fund</div>
            </div>
          )}
        </div>
      </div>

      {/* Summary bar */}
      <div style={{background:T.header,padding:"0 20px 18px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          <div>
            <div style={{fontSize:9,color:"#6C7A9C",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Saved</div>
            <div style={{fontSize:17,fontWeight:900,color:"#4ade80"}}>{fmt(totalSaved)}</div>
          </div>
          <div>
            <div style={{fontSize:9,color:"#6C7A9C",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Goal</div>
            <div style={{fontSize:17,fontWeight:900,color:"#fff"}}>{fmt(totalGoal)}</div>
          </div>
          <div>
            <div style={{fontSize:9,color:"#6C7A9C",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Overall</div>
            <div style={{fontSize:17,fontWeight:900,color:"#93A8D0"}}>{overallPct}%</div>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.1)",borderRadius:4,height:5,overflow:"hidden"}}>
          <div style={{width:`${overallPct}%`,height:"100%",background:"#4ade80",borderRadius:4}}/>
        </div>
      </div>

      <div style={{padding:16}}>
        {/* Inline form */}
        {showForm&&(
          <div style={{background:T.card,borderRadius:14,border:`1px solid ${editId?T.orange:T.blue}`,padding:"16px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:13,fontWeight:800,color:editId?T.orange:T.blue}}>{editId?"Edit Fund":"New Fund"}</span>
              <button onClick={cancelForm} style={{background:T.border,border:"none",borderRadius:7,color:T.sub,fontSize:13,cursor:"pointer",width:28,height:28}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input placeholder="Fund name" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={inp}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><div style={{fontSize:10,color:T.muted,fontWeight:700,marginBottom:4,textTransform:"uppercase"}}>Goal (PKR)</div><input type="number" placeholder="500000" value={form.goal} onChange={e=>setForm(p=>({...p,goal:e.target.value}))} style={inp}/></div>
                <div><div style={{fontSize:10,color:T.muted,fontWeight:700,marginBottom:4,textTransform:"uppercase"}}>Saved So Far</div><input type="number" placeholder="0" value={form.saved} onChange={e=>setForm(p=>({...p,saved:e.target.value}))} style={inp}/></div>
              </div>
              <div>
                <div style={{fontSize:10,color:T.muted,fontWeight:700,marginBottom:4,textTransform:"uppercase"}}>Tenure (months)</div>
                <input type="number" placeholder="e.g. 24 = 2 years" value={form.months} onChange={e=>setForm(p=>({...p,months:e.target.value}))} style={inp}/>
                {form.months&&parseInt(form.months)>0&&<div style={{fontSize:10,color:T.blue,marginTop:3}}>{parseInt(form.months)>=12?`${Math.floor(parseInt(form.months)/12)}yr ${parseInt(form.months)%12?parseInt(form.months)%12+"mo":""}`.trim():parseInt(form.months)+" months"}</div>}
              </div>
              {!editId&&(
                <div>
                  <div style={{fontSize:10,color:T.muted,fontWeight:700,marginBottom:6,textTransform:"uppercase"}}>Icon & Color</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                    {ICONS.map(ic=><button key={ic} onClick={()=>setForm(p=>({...p,icon:ic}))} style={{fontSize:18,background:form.icon===ic?T.blueBg:"#f5f5f5",border:`2px solid ${form.icon===ic?T.blue:"transparent"}`,borderRadius:7,padding:"4px 6px",cursor:"pointer"}}>{ic}</button>)}
                  </div>
                  <div style={{display:"flex",gap:7}}>
                    {COLORS.map(col=><button key={col} onClick={()=>setForm(p=>({...p,color:col}))} style={{width:24,height:24,borderRadius:"50%",background:col,border:`3px solid ${form.color===col?"#111":"transparent"}`,cursor:"pointer"}}/>)}
                  </div>
                </div>
              )}
              <button style={btnRed} onClick={save}>{editId?"Save Changes":"Create Fund"}</button>
            </div>
          </div>
        )}

        {/* Fund cards — clean */}
        {funds.map(f=>{
          const pct=Math.min(Math.round((f.saved/f.goal)*100),100);
          const remaining=f.goal-f.saved;
          const done=pct>=100;
          const monthly=f.months&&f.months>0&&!done?Math.ceil(remaining/f.months):null;
          return(
            <div key={f.id} style={{background:T.card,borderRadius:16,border:`1px solid ${T.border}`,padding:"16px",marginBottom:10,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
              {/* Top row: icon + name + ••• */}
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:40,height:40,borderRadius:11,background:f.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{f.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:T.text}}>{f.name}</div>
                  <div style={{fontSize:10,color:T.muted,marginTop:1}}>
                    {f.months?`${f.months>=12?`${Math.floor(f.months/12)}yr${f.months%12?" "+f.months%12+"mo":""}`:f.months+"mo"} tenure · `:""}Goal {fmt(f.goal)}
                  </div>
                </div>
                <div style={{position:"relative",flexShrink:0}}>
                  {done&&<span style={{fontSize:10,background:T.greenBg,color:T.green,padding:"3px 8px",borderRadius:6,fontWeight:800,marginRight:6}}>✓</span>}
                  <button onClick={()=>setCardMenu(cardMenu===f.id?null:f.id)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:8,color:T.sub,fontSize:13,cursor:"pointer",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,letterSpacing:1}}>•••</button>
                  {cardMenu===f.id&&(
                    <div style={{position:"absolute",right:0,top:32,background:T.card,border:`1px solid ${T.border}`,borderRadius:12,zIndex:100,minWidth:130,boxShadow:"0 8px 24px rgba(0,0,0,0.12)"}}>
                      <div onClick={()=>openEdit(f)} style={{padding:"11px 14px",fontSize:13,cursor:"pointer",color:T.blue,fontWeight:600,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:8}}>✏️ Edit</div>
                      <div onClick={()=>deleteFund(f.id)} style={{padding:"11px 14px",fontSize:13,cursor:"pointer",color:T.red,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>🗑️ Delete</div>
                    </div>
                  )}
                </div>
              </div>

              {/* Saved amount + pct */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                <div style={{fontSize:20,fontWeight:900,color:f.color}}>{fmt(f.saved)}</div>
                <div style={{fontSize:12,color:done?T.green:T.muted,fontWeight:700}}>{pct}%{!done&&` · ${fmt(remaining)} left`}</div>
              </div>

              {/* Progress bar */}
              <div style={{background:T.bg,borderRadius:5,height:7,overflow:"hidden",marginBottom:done?0:10}}>
                <div style={{width:`${pct}%`,height:"100%",background:done?T.green:f.color,borderRadius:5,transition:"width 0.4s"}}/>
              </div>

              {/* Deposit row + monthly hint */}
              {!done&&(
                <>
                  <div style={{display:"flex",gap:8}}>
                    <input type="number" placeholder="Add amount…" value={addAmt[f.id]||""} onChange={e=>setAddAmt(p=>({...p,[f.id]:e.target.value}))} style={{...inp,padding:"8px 12px",fontSize:15,flex:1}}/>
                    <button onClick={()=>deposit(f.id)} style={{background:f.color,color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>+ Add</button>
                  </div>
                  {monthly&&<div style={{fontSize:10,color:T.muted,marginTop:6}}>📅 {fmt(monthly)}/month to reach goal</div>}
                </>
              )}
            </div>
          );
        })}
        {!funds.length&&<div style={{textAlign:"center",color:T.muted,padding:40,fontSize:13}}>No funds yet. Tap ••• to add one.</div>}
      </div>
    </div>
  );
}

function AccLedgerTable({selAcc,transactions,rFrom,rTo,getName}){
  if(!selAcc)return null;
  const accTxns=transactions.filter(t=>t.date>=rFrom&&t.date<=rTo&&(t.debitCode===selAcc||t.creditCode===selAcc)).sort((a,b)=>a.date.localeCompare(b.date));
  let running=transactions.filter(t=>t.date<rFrom&&(t.debitCode===selAcc||t.creditCode===selAcc)).reduce((s,t)=>t.debitCode===selAcc?s+t.amount:s-t.amount,0);
  return(
    <Card>
      <div style={{fontSize:13,fontWeight:800,marginBottom:12}}>{selAcc} · {getName(selAcc)}</div>
      <div style={{display:"grid",gridTemplateColumns:"44px 44px 1fr 64px",gap:4,padding:"6px 6px",borderBottom:`2px solid ${T.border}`}}>
        {["Date","Bilag","Description","Amount"].map(h=><div key={h} style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase"}}>{h}</div>)}
      </div>
      {accTxns.map((t,i)=>{const mv=t.debitCode===selAcc?t.amount:-t.amount;running+=mv;return(
        <div key={t.id} style={{display:"grid",gridTemplateColumns:"44px 44px 1fr 64px",gap:4,padding:"8px 6px",borderBottom:`1px solid ${T.border}`,alignItems:"center",background:i%2===0?"#fff":T.bg}}>
          <div style={{fontSize:10,color:T.sub}}>{t.date.slice(5)}</div>
          <div style={{fontSize:10,color:T.blue,fontWeight:700}}>{fmtB(t.bilag)}</div>
          <div style={{fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.description}</div>
          <div style={{fontSize:11,fontWeight:800,textAlign:"right",color:mv>=0?T.green:T.red}}>{mv>=0?"+":"−"}{fmt(mv)}</div>
        </div>
      );})}
      {!accTxns.length&&<div style={{textAlign:"center",color:T.muted,padding:20,fontSize:13}}>No transactions in this period</div>}
    </Card>
  );
}

// ─── Reports Screen ───────────────────────────────────────────────────────────

function ReportsScreen({accounts,transactions,getName,filterFrom,filterTo,onChangePeriod}){
  const[rTab,setRTab]=useState("resultat");
  const[rFrom,setRFrom]=useState(filterFrom);
  const[rTo,setRTo]=useState(filterTo);
  const[selAcc,setSelAcc]=useState("");

  // Sync when global period changes
  useEffect(()=>{setRFrom(filterFrom);setRTo(filterTo);},[filterFrom,filterTo]);

  const rTxns=useMemo(()=>transactions.filter(t=>t.date>=rFrom&&t.date<=rTo),[transactions,rFrom,rTo]);
  const income=useMemo(()=>{const m={};rTxns.filter(t=>getSK(t.creditCode)==="3000").forEach(t=>{m[t.creditCode]=(m[t.creditCode]||0)+t.amount;});return m;},[rTxns]);
  const expenses=useMemo(()=>{const m={};rTxns.filter(t=>getSK(t.debitCode)==="4000").forEach(t=>{m[t.debitCode]=(m[t.debitCode]||0)+t.amount;});return m;},[rTxns]);
  const totalInc=Object.values(income).reduce((s,v)=>s+v,0);
  const totalExp=Object.values(expenses).reduce((s,v)=>s+v,0);

  const exportCSV=(rows,filename)=>{
    const csv=rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  };

  const exportResultatXLSX=()=>{
    if(typeof XLSX==="undefined")return;
    const wb=XLSX.utils.book_new();
    const rows=[["Account","Name","Amount (PKR)"],
      ...Object.entries(income).map(([c,a])=>[c,getName(c),a]),
      ["","Total Income",totalInc],
      ...Object.entries(expenses).map(([c,a])=>[c,getName(c),-a]),
      ["","Total Expenses",-totalExp],
      ["","Net P/L",totalInc-totalExp]
    ];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,"Resultat");
    XLSX.writeFile(wb,`Resultat_${rFrom}_${rTo}.xlsx`);
  };

  const exportBalanseXLSX=()=>{
    if(typeof XLSX==="undefined")return;
    const wb=XLSX.utils.book_new();
    const rows=[["Code","Account","Balance (PKR)"]];
    accounts.forEach(a=>{
      const bal=transactions.reduce((s,t)=>{if(t.debitCode===a.code)return s+t.amount;if(t.creditCode===a.code)return s-t.amount;return s;},0);
      rows.push([a.code,a.name,bal]);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb,ws,"Balanse");
    XLSX.writeFile(wb,`Balanserapport_${rTo}.xlsx`);
  };

  const exportResultat=()=>{
    const rows=[["Code","Account","Amount (PKR)"],
      ["","=== INCOME ===",""],
      ...Object.entries(income).map(([c,a])=>[c,getName(c),a]),
      ["","TOTAL INCOME",totalInc],
      ["","",""],
      ["","=== EXPENSES ===",""],
      ...Object.entries(expenses).map(([c,a])=>[c,getName(c),-a]),
      ["","TOTAL EXPENSES",-totalExp],
      ["","",""],
      ["","NET PROFIT / LOSS",totalInc-totalExp],
    ];
    exportCSV(rows,`Resultat_${rFrom}_${rTo}.csv`);
  };

  const exportBalanse=()=>{
    const rows=[["Code","Account","Balance (PKR)"]];
    let grandTotal=0;
    Object.entries(SERIES).forEach(([key,s])=>{
      const grp=accounts.filter(a=>getSK(a.code)===key);
      if(!grp.length)return;
      rows.push(["",`=== ${s.name.toUpperCase()} ===`,""]);
      let groupTotal=0;
      grp.forEach(a=>{
        const bal=transactions.reduce((ss,t)=>{if(t.debitCode===a.code)return ss+t.amount;if(t.creditCode===a.code)return ss-t.amount;return ss;},0);
        rows.push([a.code,a.name,bal]);
        groupTotal+=bal;
      });
      rows.push(["",`Total ${s.name}`,groupTotal]);
      rows.push(["","",""]);
      grandTotal+=groupTotal;
    });
    rows.push(["","GRAND TOTAL",grandTotal]);
    exportCSV(rows,`Balanserapport_${rTo}.csv`);
  };

  const exportAccLedger=()=>{
    if(!selAcc)return;
    const rows=[["Date","Bilag","Description","Amount (PKR)"]];

    const accTxns=transactions.filter(t=>t.date>=rFrom&&t.date<=rTo&&(t.debitCode===selAcc||t.creditCode===selAcc)).sort((a,b)=>a.date.localeCompare(b.date));

      </tbody></table>
      <div class="net-box"><span>Net Profit / Loss</span><span>${sign(totalInc-totalExp)}</span></div>`;
    printPDF(`Resultat ${rFrom} to ${rTo}`,rows);
  };

  const exportBalansePDF=()=>{
    let rows=`<h1>Balanserapport</h1><div class="sub">As of: ${rTo} &nbsp;|&nbsp; Generated: ${new Date().toLocaleDateString()}</div>`;
    Object.entries(SERIES).forEach(([key,s])=>{
      const grp=accounts.filter(a=>getSK(a.code)===key);
      if(!grp.length)return;
      const total=grp.reduce((sum,a)=>sum+transactions.reduce((ss,t)=>{if(t.debitCode===a.code)return ss+t.amount;if(t.creditCode===a.code)return ss-t.amount;return ss;},0),0);
      rows+=`<div class="section-hdr">${s.name}</div><table><thead><tr><th>Code</th><th>Account</th><th class="right">Balance (PKR)</th></tr></thead><tbody>`;
      grp.forEach(a=>{
        const bal=transactions.reduce((ss,t)=>{if(t.debitCode===a.code)return ss+t.amount;if(t.creditCode===a.code)return ss-t.amount;return ss;},0);
        rows+=`<tr><td>${a.code}</td><td>${a.name}</td><td class="right">${sign(bal)}</td></tr>`;
      });
      rows+=`<tr class="total-row"><td></td><td>Total ${s.name}</td><td class="right">${sign(total)}</td></tr></tbody></table>`;
    });
    printPDF(`Balanserapport ${rTo}`,rows);
  };

  const exportAccLedgerPDF=()=>{
    if(!selAcc)return;
    const accTxns=transactions.filter(t=>t.date>=rFrom&&t.date<=rTo&&(t.debitCode===selAcc||t.creditCode===selAcc)).sort((a,b)=>a.date.localeCompare(b.date));
    let total=0;
    let tRows=accTxns.map(t=>{
      const mv=t.debitCode===selAcc?t.amount:-t.amount;
      total+=mv;
      const color=mv>=0?"#00875A":"#D0021B";
      return`<tr><td>${t.date}</td><td>${fmtB(t.bilag)}</td><td>${t.description}</td><td class="right" style="color:${color};font-weight:700;">${mv>=0?"+":"-"}${fmt(Math.abs(mv))}</td></tr>`;
    }).join("");
    const totalColor=total>=0?"#00875A":"#D0021B";
    const accName=getName(selAcc);
    const html=`<h1>${accName}</h1>
      <div class="sub">Period: ${rFrom} → ${rTo} &nbsp;|&nbsp; Generated: ${new Date().toLocaleDateString()}</div>
      <table><thead><tr><th>Date</th><th>Bilag</th><th>Description</th><th class="right">Amount (PKR)</th></tr></thead>
      <tbody>
        ${tRows}
        ${!accTxns.length?'<tr><td colspan="4" style="text-align:center;color:#888;padding:20px;">No transactions in this period</td></tr>':""}
        <tr class="total-row"><td></td><td></td><td>TOTAL</td><td class="right" style="color:${totalColor};">${total>=0?"+":"-"}${fmt(Math.abs(total))}</td></tr>
      </tbody></table>`;
    printPDF(`${accName} ${rFrom} to ${rTo}`,html);
  };

  const TAB_STYLE=(active)=>({padding:"8px 16px",fontSize:12,fontWeight:active?800:600,color:active?"#fff":T.sub,background:active?T.blue:"transparent",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit"});

  return(
    <div>
      {/* Tab switcher */}
      <div style={{display:"flex",gap:4,background:T.bg,borderRadius:10,padding:4,marginBottom:14,border:`1px solid ${T.border}`}}>
        {[["resultat","📊 Resultat"],["balanse","⚖️ Balanse"],["account","📒 Account"]].map(([id,label])=>(
          <button key={id} onClick={()=>setRTab(id)} style={{...TAB_STYLE(rTab===id),flex:1,borderRadius:7,padding:"7px 4px",fontSize:11}}>{label}</button>
        ))}
      </div>

      {/* Resultat (P&L) */}
      {rTab==="resultat"&&(
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:800}}>Resultatregnskap</div>
            <Menu3 items={[
              {icon:"📄",label:"Export CSV",action:exportResultat},
              {icon:"📗",label:"Export Excel",action:exportResultatXLSX},
              {icon:"📕",label:"Export PDF",action:exportResultatPDF},
            ]}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:T.green,fontWeight:800,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Income</div>
            {Object.entries(income).map(([code,amt])=>(<div key={code} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5,paddingLeft:8}}><span style={{color:T.sub}}>{code} · {getName(code)}</span><span style={{fontWeight:700,color:T.green}}>+{fmt(amt)}</span></div>))}
            {!Object.keys(income).length&&<div style={{fontSize:12,color:T.muted,paddingLeft:8}}>No income entries</div>}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:13,color:T.green,borderTop:`1px solid ${T.border}`,paddingTop:8,marginTop:8}}><span>Total Income</span><span>+{fmt(totalInc)}</span></div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:T.orange,fontWeight:800,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Expenses</div>
            {Object.entries(expenses).map(([code,amt])=>(<div key={code} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5,paddingLeft:8}}><span style={{color:T.sub}}>{code} · {getName(code)}</span><span style={{fontWeight:700,color:T.orange}}>−{fmt(amt)}</span></div>))}
            {!Object.keys(expenses).length&&<div style={{fontSize:12,color:T.muted,paddingLeft:8}}>No expense entries</div>}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:13,color:T.orange,borderTop:`1px solid ${T.border}`,paddingTop:8,marginTop:8}}><span>Total Expenses</span><span>−{fmt(totalExp)}</span></div>
          </div>
          <div style={{background:totalInc-totalExp>=0?T.greenBg:T.redLight,borderRadius:10,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:700}}>Net Profit / Loss</span>
            <span style={{fontSize:20,fontWeight:900,color:totalInc-totalExp>=0?T.green:T.red}}>{sign(totalInc-totalExp)}</span>
          </div>
        </Card>
      )}

      {/* Balanserapport */}
      {rTab==="balanse"&&(
        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:800}}>Balanserapport</div>
            <Menu3 items={[
              {icon:"📄",label:"Export CSV",action:exportBalanse},
              {icon:"📗",label:"Export Excel",action:exportBalanseXLSX},
              {icon:"📕",label:"Export PDF",action:exportBalansePDF},
            ]}/>
          </div>
          {Object.entries(SERIES).map(([key,s])=>{
            const grp=accounts.filter(a=>getSK(a.code)===key);
            if(!grp.length)return null;
            const total=grp.reduce((sum,a)=>sum+transactions.reduce((ss,t)=>{if(t.debitCode===a.code)return ss+t.amount;if(t.creditCode===a.code)return ss-t.amount;return ss;},0),0);
            return(
              <div key={key} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:11,color:s.color,fontWeight:800,textTransform:"uppercase",letterSpacing:0.5}}>{s.icon} {s.name}</div>
                  <div style={{fontSize:12,fontWeight:800,color:total>=0?T.green:T.red}}>{sign(total)}</div>
                </div>
                {grp.map(a=>{const bal=transactions.reduce((ss,t)=>{if(t.debitCode===a.code)return ss+t.amount;if(t.creditCode===a.code)return ss-t.amount;return ss;},0);return(
                  <div key={a.code} style={{display:"flex",justifyContent:"space-between",fontSize:12,paddingLeft:12,paddingBottom:5,color:T.sub}}>
                    <span>{a.code} · {a.name}</span>
                    <span style={{fontWeight:700,color:bal>=0?T.green:T.red}}>{sign(bal)}</span>
                  </div>
                );})}
                <div style={{height:1,background:T.border,marginTop:4}}/>
              </div>
            );
          })}
        </Card>
      )}

      {/* Account Ledger */}
      {rTab==="account"&&(
        <div>
          <Card style={{marginBottom:12}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{flex:1}}>
                <AccDropFlat value={selAcc} onChange={setSelAcc} accounts={accounts}/>
              </div>
              {selAcc&&<div style={{flexShrink:0}}><Menu3 items={[
                {icon:"📄",label:"Export CSV",action:exportAccLedger},
                {icon:"📕",label:"Export PDF",action:exportAccLedgerPDF},
              ]}/></div>}
            </div>
          </Card>
          <AccLedgerTable selAcc={selAcc} transactions={transactions} rFrom={rFrom} rTo={rTo} getName={getName}/>
        </div>
      )}
    </div>
  );
}

// ─── Import Excel Screen ───────────────────────────────────────────────────────
function ImportScreen({accounts,addTransaction,nextBilag,onBack}){
  const[rows,setRows]=useState([]);
  const[status,setStatus]=useState("idle"); // idle | preview | importing | done | error
  const[progress,setProgress]=useState(0);
  const[total,setTotal]=useState(0);
  const[errMsg,setErrMsg]=useState("");
  const[imported,setImported]=useState(0);

  const handleFile=e=>{
    const file=e.target.files[0];
    if(!file)return;
    if(typeof XLSX==="undefined"){setErrMsg("Excel reader not loaded. Please refresh the page and try again.");setStatus("error");return;}
    setStatus("idle");setRows([]);setErrMsg("");
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=new Uint8Array(ev.target.result);
        const wb=XLSX.read(data,{type:"array"});
        const ws=wb.Sheets["Import Entries"];
        if(!ws){setErrMsg("Sheet 'Import Entries' not found in the file.");setStatus("error");return;}
        const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        // Skip title row (row 1) and header row (row 2), start from row 3
        const parsed=[];
        for(let i=2;i<json.length;i++){
          const r=json[i];
          const date=r[0],dr=String(r[1]||"").trim(),cr=String(r[2]||"").trim(),desc=String(r[3]||"").trim();
          const amt=parseFloat(r[4]);
          const contact=String(r[5]||"").trim();
          if(!date||!dr||!cr||!desc||isNaN(amt)||amt<=0)continue;
          // Normalise date
          let d=date;
          if(typeof date==="number"){
            const dt=XLSX.SSF.parse_date_code(date);
            d=`${dt.y}-${String(dt.m).padStart(2,"0")}-${String(dt.d).padStart(2,"0")}`;
          } else {
            d=String(date).trim();
          }
          parsed.push({date:d,debitCode:dr,creditCode:cr,description:desc,amount:amt,contactId:contact||null});
        }
        if(!parsed.length){setErrMsg("No valid rows found. Check the file format.");setStatus("error");return;}
        setRows(parsed);
        setTotal(parsed.length);
        setStatus("preview");
      }catch(err){
        setErrMsg("Could not read the file: "+err.message);
        setStatus("error");
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const doImport=async()=>{
    setStatus("importing");setProgress(0);setImported(0);
    let nb=nextBilag;
    let count=0;
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      try{
        await addTransaction({...row,bilag:nb});
        nb++;count++;
      }catch(err){
        console.error("Row",i,"failed:",err);
      }
      setProgress(i+1);
      setImported(count);
      // Small delay to avoid hammering Supabase
      if(i%10===9) await new Promise(r=>setTimeout(r,300));
    }
    setStatus("done");
  };

  const pct=total>0?Math.round((progress/total)*100):0;

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      <BackHeader title="Import Excel" sub="BULK IMPORT ENTRIES" onBack={onBack}/>
      <div style={{padding:16}}>

        {/* Step 1 — Upload */}
        <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:16,marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:800,color:T.text,marginBottom:4}}>Step 1 — Upload your import file</div>
          <div style={{fontSize:11,color:T.muted,marginBottom:12,lineHeight:1.6}}>
            Upload the file <strong>Danish_Finance_Jan_May_Import.xlsx</strong> I gave you. It must have a sheet named <em>Import Entries</em>.
          </div>
          <label style={{display:"block",background:T.blueBg,border:`2px dashed ${T.blue}`,borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:28,marginBottom:6}}>📂</div>
            <div style={{fontSize:13,fontWeight:700,color:T.blue}}>Tap to choose Excel file</div>
            <div style={{fontSize:11,color:T.muted,marginTop:4}}>.xlsx files only</div>
            <input type="file" accept=".xlsx" onChange={handleFile} style={{display:"none"}}/>
          </label>
        </div>

        {/* Error */}
        {status==="error"&&(
          <div style={{background:T.redLight,borderRadius:12,padding:"14px 16px",marginBottom:12,border:`1px solid ${T.redMid}`}}>
            <div style={{fontSize:13,fontWeight:700,color:T.red,marginBottom:4}}>❌ Error</div>
            <div style={{fontSize:12,color:T.red}}>{errMsg}</div>
          </div>
        )}

        {/* Preview */}
        {(status==="preview"||status==="importing"||status==="done")&&rows.length>0&&(
          <div style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:800,color:T.text,marginBottom:12}}>
              {status==="preview"&&`Step 2 — Preview (${rows.length} entries found)`}
              {status==="importing"&&`Importing… ${progress} / ${total}`}
              {status==="done"&&`✅ Done — ${imported} entries imported`}
            </div>

            {/* Progress bar */}
            {(status==="importing"||status==="done")&&(
              <div style={{marginBottom:14}}>
                <div style={{background:T.bg,borderRadius:6,height:10,overflow:"hidden",marginBottom:6}}>
                  <div style={{width:`${pct}%`,height:"100%",background:status==="done"?T.green:T.blue,borderRadius:6,transition:"width 0.3s"}}/>
                </div>
                <div style={{fontSize:11,color:T.muted,textAlign:"center"}}>{pct}% — {imported} saved to database</div>
              </div>
            )}

            {/* Preview table */}
            {status==="preview"&&(
              <>
                <div style={{display:"grid",gridTemplateColumns:"80px 52px 52px 1fr 70px",gap:4,padding:"6px 0",borderBottom:`2px solid ${T.border}`,marginBottom:4}}>
                  {["Date","Debit","Credit","Description","Amount"].map(h=>(
                    <div key={h} style={{fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase"}}>{h}</div>
                  ))}
                </div>
                <div style={{maxHeight:280,overflowY:"auto"}}>
                  {rows.slice(0,50).map((r,i)=>(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"80px 52px 52px 1fr 70px",gap:4,padding:"5px 0",borderBottom:`1px solid ${T.border}`,alignItems:"center",background:i%2===0?"#fff":T.bg}}>
                      <div style={{fontSize:10,color:T.muted}}>{r.date}</div>
                      <div style={{fontSize:10,fontWeight:700,color:T.red}}>{r.debitCode}</div>
                      <div style={{fontSize:10,fontWeight:700,color:T.green}}>{r.creditCode}</div>
                      <div style={{fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.description}</div>
                      <div style={{fontSize:11,fontWeight:700,textAlign:"right",color:T.text}}>{r.amount.toLocaleString()}</div>
                    </div>
                  ))}
                  {rows.length>50&&<div style={{textAlign:"center",padding:8,fontSize:11,color:T.muted}}>…and {rows.length-50} more</div>}
                </div>
                <div style={{marginTop:14,display:"flex",gap:8}}>
                  <button style={btnRed} onClick={doImport}>⬆ Import All {rows.length} Entries</button>
                </div>
                <div style={{fontSize:10,color:T.muted,marginTop:8,lineHeight:1.5}}>
                  ⚠️ Make sure you have added all accounts and Reskontro contacts before importing.
                </div>
              </>
            )}

            {status==="done"&&(
              <div style={{textAlign:"center",padding:"10px 0"}}>
                <div style={{fontSize:40,marginBottom:8}}>🎉</div>
                <div style={{fontSize:14,fontWeight:700,color:T.green,marginBottom:4}}>All entries imported!</div>
                <div style={{fontSize:12,color:T.muted,marginBottom:16}}>Go to Accounts or Reports to verify your balances.</div>
                <button style={btnRed} onClick={onBack}>← Back to Home</button>
              </div>
            )}
          </div>
        )}

        {/* Instructions */}
        {status==="idle"&&(
          <div style={{background:T.blueBg,borderRadius:12,padding:"14px 16px",border:`1px solid ${T.border}`}}>
            <div style={{fontSize:12,fontWeight:800,color:T.blue,marginBottom:8}}>Before importing — add these contacts in Reskontro:</div>
            {[["S001","Papa (Muhammad Riaz)","Supplier"],["S002","Khala Naghmana","Supplier"],["S003","Mamu Hameed","Supplier"],["S004","Adil Mubarak","Supplier"],["S005","Faraz Khan","Supplier"]].map(([id,name,type])=>(
              <div key={id} style={{display:"flex",gap:8,fontSize:11,color:T.text,marginBottom:4}}>
                <span style={{background:T.blueBg,color:T.blue,fontWeight:700,padding:"1px 6px",borderRadius:4,minWidth:36,textAlign:"center"}}>{id}</span>
                <span>{name} <span style={{color:T.muted}}>({type})</span></span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Budget Module ────────────────────────────────────────────────────────────
function BudgetScreen({accounts,transactions,filterFrom,filterTo,onBack}){
  const BKEY="rr_budgets";
  const[budgets,setBudgetsState]=useState(()=>{try{const s=localStorage.getItem(BKEY);return s?JSON.parse(s):{}}catch{return{};}});
  const[editModal,setEditModal]=useState(null); // {code, name}
  const[editVal,setEditVal]=useState("");
  const[cardMenu,setCardMenu]=useState(null);

  const expAccounts=accounts.filter(a=>getSK(a.code)==="4000");
  const periodTxns=transactions.filter(t=>t.date>=filterFrom&&t.date<=filterTo);
  const getActual=code=>periodTxns.filter(t=>t.debitCode===code).reduce((s,t)=>s+t.amount,0);

  const saveBudgets=(b)=>{setBudgetsState(b);try{localStorage.setItem(BKEY,JSON.stringify(b));}catch{}};
  const confirmEdit=()=>{
    if(!editModal)return;
    saveBudgets({...budgets,[editModal.code]:parseFloat(editVal)||0});
    setEditModal(null);setEditVal("");
  };
  const openEdit=(a)=>{setEditVal(String(budgets[a.code]||""));setEditModal({code:a.code,name:a.name});setCardMenu(null);};

  const totalBudget=expAccounts.reduce((s,a)=>s+(budgets[a.code]||0),0);
  const totalActual=expAccounts.reduce((s,a)=>s+getActual(a.code),0);
  const totalRemaining=totalBudget-totalActual;

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:40}}>
      {cardMenu&&<div onClick={()=>setCardMenu(null)} style={{position:"fixed",inset:0,zIndex:90}}/>}

      {/* Edit modal */}
      {editModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:T.card,borderRadius:18,padding:24,width:"100%",maxWidth:340}}>
            <div style={{fontSize:13,fontWeight:800,color:T.text,marginBottom:4}}>{editModal.code} · {editModal.name}</div>
            <div style={{fontSize:11,color:T.muted,marginBottom:14}}>Set monthly budget in PKR</div>
            <input
              type="number"
              placeholder="e.g. 50000"
              value={editVal}
              onChange={e=>setEditVal(e.target.value)}
              autoFocus
              style={{...inp,marginBottom:12}}
            />
            <div style={{display:"flex",gap:8}}>
              <button onClick={confirmEdit} style={{...btnRed,flex:2}}>Save Budget</button>
              <button onClick={()=>setEditModal(null)} style={{...btnGhost,flex:1}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      <BackHeader title="Budget" sub={filterFrom.slice(0,7)} onBack={onBack}/>

      <div style={{padding:16}}>
        {/* Summary row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
          {[{label:"Budget",val:totalBudget,color:T.blue},{label:"Actual",val:totalActual,color:T.red},{label:"Left",val:totalRemaining,color:totalRemaining>=0?T.green:T.red}].map((c,i)=>(
            <div key={i} style={{background:T.card,borderRadius:12,padding:"12px 10px",textAlign:"center",border:`1px solid ${T.border}`}}>
              <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:4}}>{c.label}</div>
              <div style={{fontSize:13,fontWeight:900,color:c.color}}>{fmt(c.val)}</div>
            </div>
          ))}
        </div>

        {/* Account cards */}
        {expAccounts.map(a=>{
          const budget=budgets[a.code]||0;
          const actual=getActual(a.code);
          const pct=budget>0?Math.min(100,Math.round((actual/budget)*100)):0;
          const over=actual>budget&&budget>0;
          return(
            <div key={a.code} style={{background:T.card,borderRadius:14,border:`1px solid ${over?T.redMid:T.border}`,padding:"14px 14px 12px",marginBottom:8}}>
              {/* Header row */}
              <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
                <span style={{background:T.orangeBg,color:T.orange,borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:800,marginRight:8}}>{a.code}</span>
                <span style={{fontSize:13,fontWeight:600,color:T.text,flex:1}}>{a.name}</span>
                {over&&<span style={{fontSize:9,background:T.redLight,color:T.red,padding:"2px 6px",borderRadius:5,fontWeight:800,marginRight:6}}>OVER</span>}
                <div style={{position:"relative"}}>
                  <button onClick={()=>setCardMenu(cardMenu===a.code?null:a.code)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:7,color:T.sub,fontSize:12,cursor:"pointer",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>•••</button>
                  {cardMenu===a.code&&(
                    <div style={{position:"absolute",right:0,top:30,background:T.card,border:`1px solid ${T.border}`,borderRadius:10,zIndex:100,minWidth:130,boxShadow:"0 8px 24px rgba(0,0,0,0.12)"}}>
                      <div onClick={()=>openEdit(a)} style={{padding:"11px 14px",fontSize:13,cursor:"pointer",color:T.blue,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>✏️ Set Budget</div>
                    </div>
                  )}
                </div>
              </div>

              {/* Budget vs Actual */}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <div style={{fontSize:11,color:T.muted}}>Budget <span style={{fontWeight:700,color:T.text}}>{budget>0?fmt(budget):"—"}</span></div>
                <div style={{fontSize:11,color:T.muted}}>Actual <span style={{fontWeight:700,color:over?T.red:T.text}}>{fmt(actual)}</span>{budget>0&&<span style={{color:T.muted}}> · {pct}%</span>}</div>
              </div>

              {/* Bar */}
              {budget>0&&(
                <div style={{background:T.bg,borderRadius:4,height:5,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:over?T.red:T.green,borderRadius:4,transition:"width 0.3s"}}/>
                </div>
              )}
              {!budget&&<div style={{fontSize:10,color:T.muted,fontStyle:"italic"}}>No budget set — tap ••• to set one</div>}
            </div>
          );
        })}
        {!expAccounts.length&&<div style={{textAlign:"center",color:T.muted,padding:30,fontSize:13}}>Add expense accounts (4000s) first.</div>}
      </div>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────

function FinanceTracker({accounts,setAccounts,contacts,setContacts,transactions,addTransaction,saveEdit,deleteTxn,reverseTransaction,matchTransactions,sinkingFunds,saveSinkingFunds,nextBilag,onSignOut,isAdmin,canEdit,profiles,viewingUserId,onSwitchUser}){
  const[tab,setTab]=useState("Dashboard");
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[ledgerAcc,setLedgerAcc]=useState(null);
  const[ledgerExpanded,setLedgerExpanded]=useState(false);




  const[entrySearch,setEntrySearch]=useState("");
  const[bankAttachments,setBankAttachmentsState]=useState(()=>{try{const saved=localStorage.getItem("rr_bank_attachments");return saved?JSON.parse(saved):{}}catch{return{};}});
  const setBankAttachments=(fn)=>{setBankAttachmentsState(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem("rr_bank_attachments",JSON.stringify(next));}catch(e){}return next;});};
  const _now=new Date();
  const _y=_now.getFullYear();
  const _m=String(_now.getMonth()+1).padStart(2,"0");
  const _lastDay=new Date(_y,_now.getMonth()+1,0).getDate();
  const[filterFrom,setFilterFrom]=useState(`${_y}-${_m}-01`);
  const[filterTo,setFilterTo]=useState(`${_y}-${_m}-${String(_lastDay).padStart(2,"0")}`);
  const[reportPeriod,setReportPeriod]=useState({from:`${_y}-${_m}-01`,to:`${_y}-${_m}-${String(_lastDay).padStart(2,"0")}`});

  const getName=code=>((accounts.find(a=>a.code===code))||{name:code}).name;

  const filteredTxns=useMemo(()=>transactions.filter(t=>t.date>=filterFrom&&t.date<=filterTo),[transactions,filterFrom,filterTo]);
  const reportTxns=useMemo(()=>transactions.filter(t=>t.date>=reportPeriod.from&&t.date<=reportPeriod.to),[transactions,reportPeriod]);
  const reportIncome=useMemo(()=>{const m={};reportTxns.filter(t=>getSK(t.creditCode)==="3000").forEach(t=>{m[t.creditCode]=(m[t.creditCode]||0)+t.amount;});return m;},[reportTxns]);
  const reportExpenses=useMemo(()=>{const m={};reportTxns.filter(t=>getSK(t.debitCode)==="4000").forEach(t=>{m[t.debitCode]=(m[t.debitCode]||0)+t.amount;});return m;},[reportTxns]);
  const totalRI=Object.values(reportIncome).reduce((s,v)=>s+v,0);
  const totalRE=Object.values(reportExpenses).reduce((s,v)=>s+v,0);
  const searchedEntries=useMemo(()=>{const q=entrySearch.trim().toLowerCase();const all=[...transactions].sort((a,b)=>b.bilag-a.bilag);if(!q)return all;return all.filter(t=>fmtB(t.bilag).toLowerCase().includes(q)||t.description.toLowerCase().includes(q)||t.debitCode.includes(q)||t.creditCode.includes(q)||String(t.amount).includes(q));},[transactions,entrySearch]);

  if(ledgerAcc)return(<LedgerScreen account={ledgerAcc} accounts={accounts} contacts={contacts} transactions={transactions} onBack={()=>setLedgerAcc(null)} onEditTxn={saveEdit} onDeleteTxn={deleteTxn} onReverseTxn={reverseTransaction} onMatchTxns={matchTransactions} filterFrom={filterFrom} filterTo={filterTo}/>);
  if(tab==="Settings")return(<SettingsMenu accounts={accounts} onSave={setAccounts} contacts={contacts} setContacts={setContacts} onBack={()=>setTab("Dashboard")}/>);
  if(tab==="Reskontro")return(<ReskontroScreen contacts={contacts} setContacts={setContacts} transactions={transactions} matchTxns={matchTransactions} editTxn={saveEdit} deleteTxn={deleteTxn} accounts={accounts} onBack={()=>setTab("Dashboard")}/>);
  if(tab==="Import")return(<ImportScreen accounts={accounts} addTransaction={addTransaction} nextBilag={nextBilag} onBack={()=>setTab("Dashboard")}/>);
  if(tab==="SinkingFunds")return(<SinkingFundsScreen sinkingFunds={sinkingFunds} saveSinkingFunds={saveSinkingFunds} onBack={()=>setTab("Dashboard")}/>);
  if(tab==="Budget")return(<BudgetScreen accounts={accounts} transactions={transactions} filterFrom={filterFrom} filterTo={filterTo} onBack={()=>setTab("Dashboard")}/>);
  if(tab==="Bank")return(<div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto"}}><BackHeader title="Bank" sub="BANK ACCOUNTS" onBack={()=>setTab("Dashboard")}/><PeriodSelector from={filterFrom} to={filterTo} onChange={(f,t)=>{setFilterFrom(f);setFilterTo(t);}}/><div style={{padding:16}}><BankModule accounts={accounts} transactions={transactions} onOpenLedger={setLedgerAcc} filterFrom={filterFrom} filterTo={filterTo} attachments={bankAttachments} onAttach={(code,att)=>setBankAttachments(p=>({...p,[code]:att}))}/></div></div>);

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,-apple-system,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:80}}>
      {/* Sidebar */}
      {sidebarOpen&&(<>
        <div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200}}/>

          <div style={{padding:"24px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",gap:12}}>

            <div>
              <div style={{fontSize:13,fontWeight:900,color:"#fff",lineHeight:1.2}}>Redrock Danria</div>
              <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginTop:2}}>Accountants</div>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
            <div style={{padding:"8px 16px 4px",fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>Main</div>
            {SIDEBAR.filter(i=>i.group==="main").map(item=>{
              const active=tab===item.id;
              const isLedger=item.id==="Accounts";
              return(
                <div key={item.id}>
                  <div onClick={()=>{if(isLedger){setLedgerExpanded(e=>!e);}else{setTab(item.id);setSidebarOpen(false);}}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10,background:active?"rgba(208,2,27,0.15)":"transparent"}}>
                    <span style={{fontSize:16,width:20,textAlign:"center"}}>{item.icon}</span>
                    <span style={{fontSize:13,fontWeight:active?700:400,color:active?"#ff6b7a":"#94A3B8",flex:1}}>{item.label}</span>
                    {isLedger&&<span style={{fontSize:10,color:"#475569",transition:"transform 0.2s",display:"inline-block",transform:ledgerExpanded?"rotate(180deg)":"none"}}>▾</span>}
                    {active&&!isLedger&&<div style={{width:4,height:4,borderRadius:"50%",background:"#D0021B"}}/>}
                  </div>
                  {isLedger&&ledgerExpanded&&(
                    <div style={{marginLeft:12,paddingLeft:8,borderLeft:"1px solid rgba(255,255,255,0.06)"}}>
                      <div onClick={()=>{setTab("Accounts");setSidebarOpen(false);}} style={{padding:"7px 16px",cursor:"pointer",borderRadius:8,margin:"1px 8px",background:tab==="Accounts"&&!ledgerExpanded?"rgba(208,2,27,0.1)":"transparent"}}>

              <div key={item.id} onClick={()=>{setTab(item.id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10,background:active?"rgba(208,2,27,0.15)":"transparent",transition:"background 0.1s"}}>
                <span style={{fontSize:16,width:20,textAlign:"center"}}>{item.icon}</span>
                <span style={{fontSize:13,fontWeight:active?700:400,color:active?"#ff6b7a":"#94A3B8"}}>{item.label}</span>
                {active&&<div style={{marginLeft:"auto",width:4,height:4,borderRadius:"50%",background:"#D0021B"}}/>}
              </div>
            );})}
            {/* System group */}
            <div style={{padding:"14px 16px 4px",fontSize:9,color:"#334155",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>System</div>
            {SIDEBAR.filter(i=>i.group==="system").map(item=>{const active=tab===item.id;return(
              <div key={item.id} onClick={()=>{setTab(item.id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10,background:active?"rgba(208,2,27,0.15)":"transparent",transition:"background 0.1s"}}>
                <span style={{fontSize:16,width:20,textAlign:"center"}}>{item.icon}</span>
                <span style={{fontSize:13,fontWeight:active?700:400,color:active?"#ff6b7a":"#94A3B8"}}>{item.label}</span>
              </div>
            );})}
          </div>
          <div style={{padding:"14px 16px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:10,color:"#334155"}}>PKR · v2.2</div>
            <button onClick={onSignOut} style={{background:"rgba(255,255,255,0.06)",border:"none",borderRadius:8,color:"#64748B",fontSize:11,cursor:"pointer",padding:"5px 12px",fontWeight:600}}>Sign Out</button>
          </div>
        </div>
      </>)}

      {/* Top header */}
      <div style={{background:T.header,padding:"10px 16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setSidebarOpen(true)} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",width:36,height:36,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3.5,flexShrink:0}}>
          {[0,1,2].map(i=><div key={i} style={{width:14,height:1.5,background:"#fff",borderRadius:2}}/>)}
        </button>
        <img src={LOGO_B64} style={{height:36,objectFit:"contain",flexShrink:0}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>Redrock Danria</div>
          <div style={{fontSize:16,fontWeight:900,color:"#fff"}}>{tab==="Accounts"?"Ledger":tab==="Dashboard"?"Home":(SIDEBAR.find(m=>m.id===tab)||{label:tab}).label}</div>
        </div>
      </div>

      {(tab==="Dashboard"||tab==="Accounts"||tab==="Reports"||tab==="Entries")&&(

      <div style={{padding:16}}>

        {tab==="Dashboard"&&(
          <Dashboard
            transactions={transactions}
            accounts={accounts}
            filterFrom={filterFrom}
            filterTo={filterTo}
            setFilterFrom={setFilterFrom}
            setFilterTo={setFilterTo}
          />

        {tab==="Entries"&&(
          <div>

              <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:T.muted}}>🔍</span>
              <input placeholder="Search bilag, description, account..." value={entrySearch} onChange={e=>setEntrySearch(e.target.value)} style={{...inp,paddingLeft:42}}/>
            </div>
            <div style={{fontSize:12,color:T.muted,marginBottom:10,fontWeight:600}}>{searchedEntries.length} entries</div>
            {searchedEntries.map(t=><TxnCard key={t.id} t={t} accounts={accounts} contacts={contacts} onEdit={saveEdit} onDelete={deleteTxn} onReverse={reverseTransaction}/>)}
          </div>
        )}

        {tab==="Transactions"&&(
          <NewEntryForm accounts={accounts} contacts={contacts} setContacts={setContacts} nextBilag={nextBilag} onSave={(form)=>{addTransaction(form);setTab("Dashboard");}}/>

        {tab==="Accounts"&&(
          <div>

        )}

        {tab==="Profile"&&(
          <ProfileScreen onSignOut={onSignOut}/>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #F1F5F9",display:"flex",boxShadow:"0 -4px 20px rgba(0,0,0,0.08)",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {MENU.map(t=>{
          const active=tab===t.id;
          const isNew=t.isNew;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,paddingTop:8,paddingBottom:10,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              {isNew?(
                <div style={{background:"#1A3A2E",borderRadius:18,width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",marginTop:-20,boxShadow:"0 4px 14px rgba(26,58,46,0.4)"}}>
                  <span style={{color:"#fff",fontSize:26,fontWeight:300,lineHeight:1}}>+</span>
                </div>
              ):(
                <div style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:19,filter:active?"none":"grayscale(1)",opacity:active?1:0.45}}>{t.icon}</span>
                </div>
              )}
              {!isNew&&<span style={{fontSize:9,fontWeight:active?700:500,color:active?"#1A3A2E":"#94A3B8",letterSpacing:0.2}}>{t.label}</span>}
              {active&&!isNew&&<div style={{position:"absolute",bottom:0,width:20,height:2,background:"#1A3A2E",borderRadius:2}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}


ReactDOM.render(<Root/>, document.getElementById("root"));
</script>
</body>
</html>
