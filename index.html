        {[["global","🌐 Global"],["users","👤 Per User"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 16px",border:"none",background:"none",fontSize:12,fontWeight:tab===id?700:500,color:tab===id?T.accent:T.muted,borderBottom:tab===id?`2px solid ${T.accent}`:"2px solid transparent",cursor:"pointer",fontFamily:"inherit",marginBottom:-1}}>{label}</button>
        ))}
      </div>
      <div style={{padding:16}}>
        {tab==="global"&&(
          <>
            <div style={{background:T.accentLight,borderRadius:12,padding:"10px 14px",marginBottom:16,border:`1px solid ${T.accentMid}`}}>
              <div style={{fontSize:12,color:T.accent,fontWeight:600}}>Global toggles apply to all users. Per-user overrides below.</div>
            </div>
            {ADMIN_FEATURES.map(f=>(
              <div key={f.id} style={{background:T.card,borderRadius:14,border:`1px solid ${T.border}`,padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:22,flexShrink:0}}>{f.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:T.text}}>{f.label}</div>
                  <div style={{fontSize:11,color:T.muted,marginTop:1}}>{f.desc}</div>
                </div>
                <Toggle on={isGlobalOn(f.id)} onClick={()=>toggleGlobal(f.id)}/>
              </div>
            ))}
          </>
        )}
        {tab==="users"&&(
          <>
            {/* Search box */}
            <div style={{position:"relative",marginBottom:12}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:T.muted}}>🔍</span>
              <input placeholder="Search by name or email..." value={search||""} onChange={e=>setSearch(e.target.value)} style={{...inp,paddingLeft:38}}/>
            </div>

            {filteredProfiles.length?(
              <>
                {/* User cards */}
                <div style={{marginBottom:12}}>
                  {filteredProfiles.map(p=>(
                    <div key={p.id} onClick={()=>setSelUser(selUser===p.id?null:p.id)} style={{background:selUser===p.id?T.accentLight:T.card,borderRadius:12,border:`1.5px solid ${selUser===p.id?T.accent:T.border}`,padding:"12px 14px",marginBottom:6,cursor:"pointer"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:36,height:36,borderRadius:"50%",background:T.accent,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:800,flexShrink:0}}>
                          {(p.display_name||p.email||"?")[0].toUpperCase()}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.display_name||p.email?.split("@")[0]||"User"}</div>
                          <div style={{fontSize:10,color:T.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.email}</div>
                        </div>
                        {p.is_admin&&<span style={{fontSize:9,background:"#EDE9FE",color:"#7C3AED",padding:"2px 7px",borderRadius:5,fontWeight:800,flexShrink:0}}>ADMIN</span>}
                        <span style={{fontSize:14,color:T.muted}}>{selUser===p.id?"▲":"▼"}</span>
                      </div>
                      {/* Expanded user info */}
                      {selUser===p.id&&(
                        <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${T.border}`}}>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
                            {[
                              {label:"User ID",val:p.id?.slice(0,8)+"..."},
                              {label:"Joined",val:p.created_at?.slice(0,10)||"—"},
                              {label:"Plan",val:p.subscription||"Free"},
                              {label:"Status",val:p.status||"Active"},
                            ].map((info,i)=>(
                              <div key={i} style={{background:"rgba(255,255,255,0.6)",borderRadius:8,padding:"8px 10px"}}>
                                <div style={{fontSize:9,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:2}}>{info.label}</div>
                                <div style={{fontSize:12,fontWeight:600,color:T.text}}>{info.val}</div>
                              </div>
                            ))}
                          </div>
                          {/* Feature toggles for this user */}
                          <div style={{fontSize:10,color:T.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:8}}>Feature Access</div>
                          {ADMIN_FEATURES.map(f=>{
                            const globalOn=isGlobalOn(f.id);
                            const userOn=isUserOn(p.id,f.id);
                            return(
                              <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,opacity:globalOn?1:0.4}}>
                                <span style={{fontSize:14}}>{f.icon}</span>
                                <span style={{fontSize:12,color:T.text,flex:1}}>{f.label}</span>
                                {!globalOn&&<span style={{fontSize:9,color:T.red,fontWeight:600}}>Global OFF</span>}
                                <Toggle on={userOn} onClick={()=>toggleUser(p.id,f.id)} disabled={!globalOn}/>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </>
            ):(
              <div style={{fontSize:12,color:T.muted,background:T.bg,borderRadius:8,padding:"10px 12px"}}>
                {search?"No users match your search.":"No other users found. Users appear here after they sign in."}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────

function FinanceTracker({accounts,setAccounts,contacts,setContacts,transactions,addTransaction,saveEdit,deleteTxn,reverseTransaction,matchTransactions,sinkingFunds,saveSinkingFunds,nextBilag,onSignOut,isAdmin,canEdit,profiles,viewingUserId,onSwitchUser}){
  const[tab,setTab]=useState("Dashboard");
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[ledgerAcc,setLedgerAcc]=useState(null);
  const[ledgerExpanded,setLedgerExpanded]=useState(false);
  const[lastDeleted,setLastDeleted]=useState(null);

  const deleteTxnWithUndo=(id)=>{
    const txn=transactions.find(t=>t.id===id);
    if(txn)setLastDeleted(txn);
    deleteTxn(id);
    setTimeout(()=>setLastDeleted(null),6000);
  };
  const undoDelete=()=>{
    if(!lastDeleted)return;
    addTransaction(lastDeleted);
    setLastDeleted(null);
  };
  const duplicateTransaction=(txn)=>{
    addTransaction({
      date:new Date().toISOString().split("T")[0],
      debitCode:txn.debitCode,creditCode:txn.creditCode,
      description:txn.description+" (copy)",
      amount:txn.amount,contactId:txn.contactId||null,
    });
  };




  const[darkMode,setDarkMode]=useState(()=>localStorage.getItem("rr_dark")==="1");
  const[entrySearch,setEntrySearch]=useState("");
  useEffect(()=>{
    document.body.style.background=darkMode?"#111827":"#FAF9F7";
    localStorage.setItem("rr_dark",darkMode?"1":"0");
  },[darkMode]);
  const[bankAttachments,setBankAttachmentsState]=useState(()=>{try{const saved=localStorage.getItem("rr_bank_attachments");return saved?JSON.parse(saved):{}}catch{return{};}});
  const setBankAttachments=(fn)=>{setBankAttachmentsState(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem("rr_bank_attachments",JSON.stringify(next));}catch(e){}return next;});};
  const _now=new Date();
  const _y=_now.getFullYear();
  const _m=String(_now.getMonth()+1).padStart(2,"0");
  const _lastDay=new Date(_y,_now.getMonth()+1,0).getDate();
  const[filterFrom,setFilterFrom]=useState(`${_y}-${_m}-01`);
  const[filterTo,setFilterTo]=useState(`${_y}-${_m}-${String(_lastDay).padStart(2,"0")}`);
  const[reportPeriod,setReportPeriod]=useState({from:`${_y}-${_m}-01`,to:`${_y}-${_m}-${String(_lastDay).padStart(2,"0")}`});

  const getName=code=>((accounts.find(a=>a.code===code))||{name:code}).name;

  const filteredTxns=useMemo(()=>transactions.filter(t=>t.date>=filterFrom&&t.date<=filterTo),[transactions,filterFrom,filterTo]);
  const reportTxns=useMemo(()=>transactions.filter(t=>t.date>=reportPeriod.from&&t.date<=reportPeriod.to),[transactions,reportPeriod]);
  const reportIncome=useMemo(()=>{const m={};reportTxns.filter(t=>getSK(t.creditCode)==="3000").forEach(t=>{m[t.creditCode]=(m[t.creditCode]||0)+t.amount;});return m;},[reportTxns]);
  const reportExpenses=useMemo(()=>{const m={};reportTxns.filter(t=>getSK(t.debitCode)==="4000").forEach(t=>{m[t.debitCode]=(m[t.debitCode]||0)+t.amount;});return m;},[reportTxns]);
  const totalRI=Object.values(reportIncome).reduce((s,v)=>s+v,0);
  const totalRE=Object.values(reportExpenses).reduce((s,v)=>s+v,0);
  const searchedEntries=useMemo(()=>{const q=entrySearch.trim().toLowerCase();const all=[...transactions].sort((a,b)=>b.bilag-a.bilag);if(!q)return all;return all.filter(t=>fmtB(t.bilag).toLowerCase().includes(q)||t.description.toLowerCase().includes(q)||t.debitCode.includes(q)||t.creditCode.includes(q)||String(t.amount).includes(q));},[transactions,entrySearch]);

  if(ledgerAcc)return(<LedgerScreen account={ledgerAcc} accounts={accounts} contacts={contacts} transactions={transactions} onBack={()=>setLedgerAcc(null)} onEditTxn={saveEdit} onDeleteTxn={deleteTxn} onReverseTxn={reverseTransaction} onMatchTxns={matchTransactions} filterFrom={filterFrom} filterTo={filterTo}/>);

  // Handle direct ledger navigation from home KPI cards
  if(tab==="ledger_1500"||tab==="ledger_2400"){
    const code=tab==="ledger_1500"?"1500":"2400";
    const acc=accounts.find(a=>a.code===code)||{code,name:tab==="ledger_1500"?"Accounts Receivable":"Accounts Payable"};
    return(<LedgerScreen account={acc} accounts={accounts} contacts={contacts} transactions={transactions} onBack={()=>setTab("Dashboard")} onEditTxn={saveEdit} onDeleteTxn={deleteTxn} onReverseTxn={reverseTransaction} onMatchTxns={matchTransactions} filterFrom={filterFrom} filterTo={filterTo}/>);
  }
  // ── Admin feature gate ── (uses global + per-user settings)
  const getFeature=(id)=>isFeatureOn(id,viewingUserId);
  const feat={
    bank:getFeature("bank"),
    reskontro:getFeature("reskontro"),
    budget:getFeature("budget"),
    sinkingFunds:getFeature("sinkingFunds"),
    reports:getFeature("reports"),
    import:getFeature("import"),
    cheque:getFeature("cheque"),
    tags:getFeature("tags"),
    darkMode:getFeature("darkMode"),
    calcAmount:getFeature("calcAmount"),
  };

  if(tab==="AdminPanel")return isAdmin?(<AdminPanel onBack={()=>setTab("Dashboard")} profiles={profiles}/>):null;
  if(tab==="Settings")return(<SettingsMenu accounts={accounts} onSave={setAccounts} contacts={contacts} setContacts={setContacts} transactions={transactions} sinkingFunds={sinkingFunds} onBack={()=>setTab("Dashboard")}/>);
  if(tab==="Reskontro"){
    if(!feat.reskontro)return(<DisabledScreen title="Reskontro" onBack={()=>setTab("Dashboard")}/>);
    return(<ReskontroScreen contacts={contacts} setContacts={setContacts} transactions={transactions} matchTxns={matchTransactions} editTxn={saveEdit} deleteTxn={deleteTxn} accounts={accounts} onBack={()=>setTab("Dashboard")}/>);
  }
  if(tab==="Import"){
    if(!feat.import)return(<DisabledScreen title="Import Excel" onBack={()=>setTab("Dashboard")}/>);
    return(<ImportScreen accounts={accounts} addTransaction={addTransaction} nextBilag={nextBilag} onBack={()=>setTab("Dashboard")}/>);
  }
  if(tab==="SinkingFunds"){
    if(!feat.sinkingFunds)return(<DisabledScreen title="Sinking Funds" onBack={()=>setTab("Dashboard")}/>);
    return(<SinkingFundsScreen sinkingFunds={sinkingFunds} saveSinkingFunds={saveSinkingFunds} transactions={transactions} filterTo={filterTo} onBack={()=>setTab("Dashboard")}/>);
  }
  if(tab==="Budget"){
    if(!feat.budget)return(<DisabledScreen title="Budget" onBack={()=>setTab("Dashboard")}/>);
    return(<BudgetScreen accounts={accounts} transactions={transactions} filterFrom={filterFrom} filterTo={filterTo} onBack={()=>setTab("Dashboard")}/>);
  }
  if(tab==="Cheques"){
    if(!feat.cheque)return(<DisabledScreen title="Cheque Tracker" onBack={()=>setTab("Dashboard")}/>);
    return(<ChequeScreen onBack={()=>setTab("Dashboard")}/>);
  }
  if(tab==="Files")return(<FilesScreen onBack={()=>setTab("Dashboard")}/>);
  if(tab==="Bank"){
    if(!feat.bank)return(<DisabledScreen title="Bank" onBack={()=>setTab("Dashboard")}/>);
    return(<div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,sans-serif",maxWidth:430,margin:"0 auto"}}><BackHeader title="Bank" sub="BANK ACCOUNTS" onBack={()=>setTab("Dashboard")}/><PeriodSelector from={filterFrom} to={filterTo} onChange={(f,t)=>{setFilterFrom(f);setFilterTo(t);}}/><div style={{padding:16}}><BankModule accounts={accounts} transactions={transactions} onOpenLedger={setLedgerAcc} filterFrom={filterFrom} filterTo={filterTo} attachments={bankAttachments} onAttach={(code,att)=>setBankAttachments(p=>({...p,[code]:att}))}/></div></div>);
  }

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"system-ui,-apple-system,sans-serif",maxWidth:430,margin:"0 auto",paddingBottom:80}}>
      {/* Sidebar */}
      {sidebarOpen&&(<>
        <div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200}}/>
        <div style={{position:"fixed",top:0,left:0,bottom:0,width:240,background:"#0A5C60",zIndex:201,display:"flex",flexDirection:"column",boxShadow:"6px 0 32px rgba(0,0,0,0.3)"}}>
          <div style={{padding:"24px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)",display:"flex",alignItems:"center",gap:12}}>
            <img src={LOGO_B64} style={{height:44,objectFit:"contain"}}/>
            <div>
              <div style={{fontSize:13,fontWeight:900,color:"#fff",lineHeight:1.2}}>Redrock Danria</div>
              <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginTop:2}}>Accountants</div>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
            <div style={{padding:"8px 16px 4px",fontSize:9,color:"rgba(255,255,255,0.3)",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>Main</div>
            {SIDEBAR.filter(i=>i.group==="main").map(item=>{
              const active=tab===item.id;
              const isLedger=item.id==="Accounts";
              return(
                <div key={item.id}>
                  <div onClick={()=>{if(isLedger){setLedgerExpanded(e=>!e);}else{setTab(item.id);setSidebarOpen(false);}}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10,background:active?"rgba(255,255,255,0.12)":"transparent"}}>
                    <span style={{fontSize:16,width:20,textAlign:"center"}}>{item.icon}</span>
                    <span style={{fontSize:13,fontWeight:active?700:400,color:active?"#E8F4F4":"rgba(255,255,255,0.6)",flex:1}}>{item.label}</span>
                    {isLedger&&<span style={{fontSize:10,color:"#475569",transition:"transform 0.2s",display:"inline-block",transform:ledgerExpanded?"rotate(180deg)":"none"}}>▾</span>}
                    {active&&!isLedger&&<div style={{width:4,height:4,borderRadius:"50%",background:"rgba(255,255,255,0.8)"}}/>}
                  </div>
                  {isLedger&&ledgerExpanded&&(
                    <div style={{marginLeft:12,paddingLeft:8,borderLeft:"1px solid rgba(255,255,255,0.06)"}}>
                      <div onClick={()=>{setTab("Accounts");setSidebarOpen(false);}} style={{padding:"7px 16px",cursor:"pointer",borderRadius:8,margin:"1px 8px",background:tab==="Accounts"&&!ledgerExpanded?"rgba(255,255,255,0.12)":"transparent"}}>
                        <span style={{fontSize:12,color:"#64748B",fontWeight:500}}>All Accounts</span>
                      </div>
                      {Object.entries(SERIES).map(([key,s])=>(
                        <div key={key} onClick={()=>{setTab("Accounts");setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 16px",cursor:"pointer",borderRadius:8,margin:"1px 8px"}}>
                          <span style={{fontSize:12}}>{s.icon}</span>
                          <span style={{fontSize:11,color:"#64748B"}}>{s.name}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{padding:"14px 16px 4px",fontSize:9,color:"rgba(255,255,255,0.3)",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>Tools</div>
            {SIDEBAR.filter(i=>i.group==="tools").map(item=>{
              const active=tab===item.id;
              const featureKey={Bank:"bank",Reskontro:"reskontro",Budget:"budget",SinkingFunds:"sinkingFunds",Reports:"reports",Import:"import",Cheques:"cheque",Files:"files"}[item.id];
              const isOff=featureKey&&!feat[featureKey];
              if(isOff)return null;
              return(
                <div key={item.id} onClick={()=>{setTab(item.id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10,background:active?"rgba(255,255,255,0.12)":"transparent",transition:"background 0.1s"}}>
                  <span style={{fontSize:16,width:20,textAlign:"center"}}>{item.icon}</span>
                  <span style={{fontSize:13,fontWeight:active?700:400,color:active?"#E8F4F4":"rgba(255,255,255,0.6)"}}>{item.label}</span>
                  {active&&<div style={{marginLeft:"auto",width:4,height:4,borderRadius:"50%",background:"rgba(255,255,255,0.8)"}}/>}
                </div>
              );
            })}
            {/* System group */}
            <div style={{padding:"14px 16px 4px",fontSize:9,color:"rgba(255,255,255,0.3)",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>System</div>
            {SIDEBAR.filter(i=>i.group==="system"&&(i.id!=="AdminPanel"||isAdmin)).map(item=>{const active=tab===item.id;return(
              <div key={item.id} onClick={()=>{setTab(item.id);setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10,background:active?"rgba(255,255,255,0.12)":"transparent"}}>
                <span style={{fontSize:16,width:20,textAlign:"center"}}>{item.icon}</span>
                <span style={{fontSize:13,fontWeight:active?700:400,color:active?"#E8F4F4":"rgba(255,255,255,0.6)"}}>{item.label}</span>
              </div>
            );})}
            <div onClick={()=>setDarkMode(d=>!d)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",cursor:"pointer",margin:"1px 8px",borderRadius:10}}>
              <span style={{fontSize:16,width:20,textAlign:"center"}}>{darkMode?"☀️":"🌙"}</span>
              <span style={{fontSize:13,color:"rgba(255,255,255,0.6)"}}>{darkMode?"Light Mode":"Dark Mode"}</span>
            </div>
          </div>
          <div style={{padding:"14px 16px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>PKR · v2.2</div>
            <button onClick={onSignOut} style={{background:"rgba(255,255,255,0.06)",border:"none",borderRadius:8,color:"#64748B",fontSize:11,cursor:"pointer",padding:"5px 12px",fontWeight:600}}>Sign Out</button>
          </div>
        </div>
      </>)}

      {/* Top header */}
      <div style={{background:T.header,borderBottom:`1px solid rgba(255,255,255,0.1)`,padding:"0 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(13,115,119,0.2)",height:68}}>
        <button onClick={()=>setSidebarOpen(true)} style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:10,color:"#fff",cursor:"pointer",width:36,height:36,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3.5,flexShrink:0}}>
          {[0,1,2].map(i=><div key={i} style={{width:14,height:1.5,background:"#fff",borderRadius:2}}/>)}
        </button>
        <div style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center",height:"100%"}}>
          <img src={LOGO_B64} style={{height:"130%",width:"auto",objectFit:"contain",display:"block"}}/>
        </div>
        <div style={{width:36,flexShrink:0}}/>
      </div>

      {(tab==="Dashboard"||tab==="Accounts"||tab==="Reports"||tab==="Entries")&&(
        <PeriodSelector from={filterFrom} to={filterTo} onChange={(f,t)=>{setFilterFrom(f);setFilterTo(t);}}/>
      )}

      <div style={{padding:16}}>

        {tab==="Dashboard"&&(
          <Dashboard
            transactions={transactions}
            accounts={accounts}
            filterFrom={filterFrom}
            filterTo={filterTo}
            setFilterFrom={setFilterFrom}
            setFilterTo={setFilterTo}
            onNavigate={setTab}
            feat={feat}
          />
        )}

        {tab==="Entries"&&(
          <div>
            {/* Undo toast */}
            {lastDeleted&&(
              <div style={{background:"#1A1A2A",borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#fff",fontWeight:500}}>Entry deleted</span>
                <button onClick={undoDelete} style={{background:T.accent,color:"#fff",border:"none",borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Undo</button>
              </div>
            )}
            <div style={{position:"relative",marginBottom:12}}>
              <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:T.muted}}>🔍</span>
              <input placeholder="Search bilag, description, account..." value={entrySearch} onChange={e=>setEntrySearch(e.target.value)} style={{...inp,paddingLeft:42}}/>
            </div>
            <div style={{fontSize:12,color:T.muted,marginBottom:10,fontWeight:600}}>{searchedEntries.length} entries</div>
            {searchedEntries.map(t=><TxnCard key={t.id} t={t} accounts={accounts} contacts={contacts} onEdit={saveEdit} onDelete={deleteTxnWithUndo} onReverse={reverseTransaction} onDuplicate={duplicateTransaction}/>)}
          </div>
        )}

        {tab==="Transactions"&&(
          <NewEntryForm accounts={accounts} contacts={contacts} setContacts={setContacts} nextBilag={nextBilag} feat={feat} onSave={(form)=>{addTransaction(form);setTab("Dashboard");}}/>
        )}

        {tab==="Accounts"&&(
          <div>
            {Object.entries(SERIES).map(([key,s])=>{
              const grp=accounts.filter(a=>getSK(a.code)===key).sort((a,b)=>a.code.localeCompare(b.code));
              if(!grp.length)return null;
              // Period balance uses filterFrom/filterTo
              return(<div key={key} style={{marginBottom:18}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,paddingLeft:2}}>
                  <span style={{fontSize:14}}>{s.icon}</span>
                  <span style={{fontSize:11,fontWeight:800,color:s.color,textTransform:"uppercase",letterSpacing:0.8}}>{s.name}</span>
                </div>
                {grp.map(a=>{
                  const periodBal=transactions.filter(t=>t.date>=filterFrom&&t.date<=filterTo).reduce((sum,t)=>{if(t.debitCode===a.code)return sum+t.amount;if(t.creditCode===a.code)return sum-t.amount;return sum;},0);
                  if(periodBal===0)return null;
                  return(
                  <div key={a.code} onClick={()=>setLedgerAcc(a)} style={{background:T.card,borderRadius:12,padding:"11px 14px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",border:`1px solid ${T.border}`,boxShadow:"0 1px 3px rgba(0,0,0,0.03)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{background:s.bg,borderRadius:7,padding:"4px 8px",fontSize:11,fontWeight:800,color:s.color,minWidth:36,textAlign:"center"}}>{a.code}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:T.text}}>{a.name}</div>
                        <div style={{fontSize:10,color:T.muted,marginTop:1}}>{s.name}</div>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:13,fontWeight:800,color:periodBal>=0?T.green:T.red}}>{periodBal>=0?"+":"−"}{fmt(periodBal)}</div>
                    </div>
                  </div>
                );})}
              </div>);
            })}
          </div>
        )}

        {tab==="Reports"&&(
          feat.reports
            ?<ReportsScreen accounts={accounts} transactions={transactions} getName={getName} filterFrom={filterFrom} filterTo={filterTo} onChangePeriod={(f,t)=>{setFilterFrom(f);setFilterTo(t);}}/>
            :<DisabledScreen title="Reports" onBack={()=>setTab("Dashboard")}/>
        )}

        {tab==="Profile"&&(
          <ProfileScreen onSignOut={onSignOut} onNavigate={setTab}/>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:`1px solid ${T.border}`,display:"flex",boxShadow:"0 -2px 16px rgba(13,115,119,0.08)",paddingBottom:"env(safe-area-inset-bottom)"}}>
        {MENU.map(t=>{
          const active=tab===t.id;
          const isNew=t.isNew;
          return(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,paddingTop:8,paddingBottom:10,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
              {isNew?(
                <div style={{background:T.header,borderRadius:18,width:48,height:48,display:"flex",alignItems:"center",justifyContent:"center",marginTop:-20,boxShadow:"0 4px 14px rgba(13,115,119,0.4)"}}>
                  <span style={{color:"#fff",fontSize:26,fontWeight:300,lineHeight:1}}>+</span>
                </div>
              ):(
                <div style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:19,filter:active?"none":"grayscale(1)",opacity:active?1:0.4}}>{t.icon}</span>
                </div>
              )}
              {!isNew&&<span style={{fontSize:9,fontWeight:active?700:500,color:active?T.header:T.muted,letterSpacing:0.2}}>{t.label}</span>}
              {active&&!isNew&&<div style={{position:"absolute",bottom:0,width:20,height:2.5,background:T.header,borderRadius:2}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}


ReactDOM.render(<Root/>, document.getElementById("root"));
</script>
</body>
</html>
